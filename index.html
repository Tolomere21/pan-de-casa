function renderCreationDayCheckin(day){
  const el=document.getElementById('creationDayContent');
  const checkin=state.starter.dailyCheckins[day]||{};
  const expectations=STARTER_DAY_EXPECTATIONS[day]||{};
  const displayDay=day-1; // day 1=prep, day 2=Día 1, etc.
  const isDay7Done=day===7&&checkin.completed;

  // Check for danger selections
  const exp=STARTER_DAY_EXPECTATIONS[day]||{};
  const cats=['bubbles','smell','rise','surface','consistency'];
  const alwaysBadItems=['mold_spots','musty_moldy','acetone'];
  let hasDanger=false;
  cats.forEach(cat=>{
    const val=checkin[cat];if(!val)return;
    if(alwaysBadItems.includes(val)){hasDanger=true;return}
    const expectedForCat=exp[cat]||[];
    if(expectedForCat.length>0&&!expectedForCat.includes(val))hasDanger=true;
  });

  // Adaptive jar at top
  let html=`<div style="display:flex;justify-content:center;margin:8px 0 16px">${renderJarSVG(checkin,{showStars:isDay7Done,hasDanger})}</div>`;

  // Day info banner
  html+=`<div class="day-info-banner"><strong>Día ${displayDay}:</strong> ${expectations.info||''}</div>`;

  // Feeding reminder
  html+=`<div class="diag-tip good" style="margin:0 auto 20px">
    <strong>Alimentación diaria:</strong> Descarta la mitad → agrega 50g harina + 50g agua tibia → mezcla bien → tapa → lugar tibio.
  </div>`;

  // Visual pickers for each diagnostic category
  const categories=['bubbles','smell','rise','surface','consistency'];
  categories.forEach(cat=>{
    const diag=STARTER_DIAGNOSTICS[cat];
    const selected=checkin[cat]||'';
    const colClass=diag.options.length>4?' three-col':'';
    const exp=STARTER_DAY_EXPECTATIONS[day]||{};
    const expectedForCat=exp[cat]||[];
    html+=`<div class="diag-section">
      <div class="diag-label"><span class="diag-icon">${diag.icon||''}</span> ${diag.label}</div>
      <div class="diag-options${colClass}">
        ${diag.options.map(opt=>{
          const isSel=selected===opt.id;
          const alwaysBad=['mold_spots','musty_moldy','acetone'];
          const neverGreen=['rotten','acetone','musty_moldy','mold_spots','hooch','dry_stiff','runny'];
          const isDanger=alwaysBad.includes(opt.id);
          const isExpected=expectedForCat.includes(opt.id);
          const isConcerning=neverGreen.includes(opt.id);
          let cls='diag-option';
          if(isSel)cls+=' selected';
          let badge='';
          if(isSel&&isDanger)badge='<span class="diag-badge bad">!</span>';
          else if(isSel&&isExpected&&!isConcerning)badge='<span class="diag-badge good">✓</span>';
          else if(isSel&&!isExpected&&expectedForCat.length>0)badge='<span class="diag-badge bad">!</span>';
          // Concerning but expected → no badge (neutral), it's normal but not "good"
          return `<div class="${cls}" data-cat="${cat}" data-val="${opt.id}">
            ${badge}
            <div class="diag-icon">${opt.icon||''}</div>
            <div class="diag-name">${opt.label}</div>
            <div class="diag-desc">${opt.desc}</div>
          </div>`;
        }).join('')}
      </div>
    </div>`;
  });

  // Notes
  html+=`<div class="diag-section">
    <div class="diag-label"><span class="diag-icon material-symbols-outlined">edit_note</span> Notas personales</div>
    <textarea class="notes-input" id="checkinNotes" rows="2" placeholder="Observaciones, fotos tomadas, dudas...">${checkin.notes||''}</textarea>
  </div>`;

  // Diagnostic tips area
  html+='<div id="diagTips"></div>';

  // Navigation buttons
  const prevLabel=day===2?'Prep':`Día ${day-2}`;
  const nextLabel=`Día ${day}`;
  html+=`<div style="display:flex;gap:10px;width:100%;max-width:400px;margin-top:8px">
    ${day>1?`<button class="btn btn-secondary" id="prevDay">← ${prevLabel}</button>`:''}
    <button class="btn btn-primary" id="completeDay" style="flex:2">${checkin.completed?'✓ Completado — actualizar':'Completar día '+displayDay}</button>
    ${day<7?`<button class="btn btn-secondary" id="nextDay">${nextLabel} →</button>`:''}
  </div>`;

  // Readiness check button (from day 7)
  if(day>=7){
    html+=`<div style="width:100%;max-width:400px;margin-top:16px">
      <button class="btn btn-secondary" id="readinessBtn" style="width:100%;border-color:var(--clay);color:var(--clay)"><span class="material-symbols-outlined" style="font-size:18px;vertical-align:middle">search</span> ¿Mi starter está lista?</button>
    </div>`;
  }

  el.innerHTML=html;

  // Event: jar warning badge click → scroll to tips
  const jarWarn=document.getElementById('jarWarning');
  if(jarWarn){
    jarWarn.addEventListener('click',()=>{
      const tips=document.getElementById('diagTips');
      if(tips)tips.scrollIntoView({behavior:'smooth',block:'center'});
    });
  }

  // Event: visual picker selection
  el.querySelectorAll('.diag-option').forEach(opt=>{
    opt.addEventListener('click',()=>{
      const cat=opt.dataset.cat;const val=opt.dataset.val;
      if(!state.starter.dailyCheckins[day])state.starter.dailyCheckins[day]={date:new Date().toISOString()};
      state.starter.dailyCheckins[day][cat]=val;saveState();
      // Re-render to update badges and selection
      renderCreationDayCheckin(day);

  });

  // Event: notes
  const notesEl=document.getElementById('checkinNotes');
  if(notesEl){
    notesEl.addEventListener('input',()=>{
      if(!state.starter.dailyCheckins[day])state.starter.dailyCheckins[day]={date:new Date().toISOString()};
      state.starter.dailyCheckins[day].notes=notesEl.value;saveState();
    });
  }

  // Event: complete day
  document.getElementById('completeDay').addEventListener('click',()=>{
    if(!state.starter.dailyCheckins[day])state.starter.dailyCheckins[day]={date:new Date().toISOString()};
    state.starter.dailyCheckins[day].completed=true;
    // Also log a feeding in starterFeedings for maintenance mode
    state.starterFeedings.push({timestamp:Date.now(),day:day,notes:checkin.notes||''});
    if(day<7)state.starter.creationDay=day+1;
    saveState();renderCreationMode();
  });

  // Event: prev/next day
  const prevBtn=document.getElementById('prevDay');
  if(prevBtn)prevBtn.addEventListener('click',()=>{state.starter.creationDay=day-1;saveState();renderCreationMode()});
  const nextBtn=document.getElementById('nextDay');
  if(nextBtn)nextBtn.addEventListener('click',()=>{state.starter.creationDay=day+1;saveState();renderCreationMode()});

  // Event: readiness check
  const readBtn=document.getElementById('readinessBtn');
  if(readBtn)readBtn.addEventListener('click',()=>renderReadinessCheck());

  // Show tips for any already-selected diagnostics
  renderDiagnosticTips(day);
}

function compareDiagnostics(day,checkin){
  const exp=STARTER_DAY_EXPECTATIONS[day];
  if(!exp)return[];
  const tips=[];

  // Check each category
  const checks=[
    {cat:'bubbles',label:'Burbujas'},
    {cat:'smell',label:'Olor'},
    {cat:'rise',label:'Volumen'},
    {cat:'surface',label:'Superficie'},
    {cat:'consistency',label:'Consistencia'}
  ];

  checks.forEach(({cat})=>{
    const val=checkin[cat];if(!val)return;
    const expected=exp[cat];if(!expected)return;
    const isExpected=expected.includes(val);

    // Danger conditions always show
    if(cat==='surface'&&val==='mold_spots'){
      tips.push({cat,tip:STARTER_TROUBLESHOOTING['surface_mold'],isDanger:true});return;
    }
    if(cat==='smell'&&val==='musty_moldy'){
      tips.push({cat,tip:STARTER_TROUBLESHOOTING['smell_musty'],isDanger:true});return;
    }

    if(!isExpected){
      // Find specific troubleshooting key
      let key='';
      if(cat==='bubbles'&&val==='none'&&day>=5)key='bubbles_none_late';
      else if(cat==='smell'&&val==='acetone')key='smell_acetone';
      else if(cat==='smell'&&val==='rotten'&&day<=4)key='smell_rotten_early';
      else if(cat==='smell'&&val==='rotten'&&day>4)key='smell_rotten_late';
      else if(cat==='rise'&&val==='none'&&day>=5)key='rise_none_late';
      else if(cat==='rise'&&(val==='tripled'||val==='doubled')&&day<=3)key='rise_tripled_early';
      else if(cat==='surface'&&val==='hooch')key='surface_hooch';
      else if(cat==='consistency'&&(val==='runny'||val==='dry_stiff'))key=val==='runny'?'consistency_runny':'consistency_dry';
      else if(cat==='bubbles'&&val==='none'&&day===3)key='general_no_activity_day3';

      if(key&&STARTER_TROUBLESHOOTING[key]){
        tips.push({cat,tip:STARTER_TROUBLESHOOTING[key],isDanger:false});
      }
    }
  });

  return tips;
}

function renderDiagnosticTips(day){
  const tipsEl=document.getElementById('diagTips');if(!tipsEl)return;
  const checkin=state.starter.dailyCheckins[day]||{};
  const tips=compareDiagnostics(day,checkin);

  if(tips.length===0){
    // Check if any selections made
    const hasSel=['bubbles','smell','rise','surface','consistency'].some(c=>checkin[c]);
    if(hasSel){
      tipsEl.innerHTML='<div class="diag-tip good" style="margin:0 auto"><span class="material-symbols-outlined" style="font-size:16px;vertical-align:middle">check_circle</span> <strong>Todo se ve normal para el día '+day+'.</strong> ¡Sigue así!</div>';
    }else{
      tipsEl.innerHTML='';
    }
    return;
  }

  tipsEl.innerHTML=tips.map(t=>
    `<div class="diag-tip${t.isDanger?' danger':''}" style="margin:4px auto">${t.tip}</div>`
  ).join('');
}

let reminderInterval;
function setupReminders(){
  if(reminderInterval)clearInterval(reminderInterval);
  if(!state.remindersOn)return;
  reminderInterval=setInterval(checkFeedReminder,60000);
  checkFeedReminder();
}
function checkFeedReminder(){
  if(!state.remindersOn)return;
  const now=new Date();const t=String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0');
  const today=now.toDateString();
  (state.feedingTimes||[]).forEach(ft=>{
    if(t===ft&&state.lastFeedNotif!==today+'-'+ft){
      sendNotification('🫙 ¡Hora de alimentar tu masa madre!',`Son las ${ft}. Necesita: 50g harina + 50g agua filtrada tibia.`);
      state.lastFeedNotif=today+'-'+ft;saveState();}});
}

// ═══ SHOPPING (Smart Carry-Over) ═══
function calcStockAtDay(chId,targetDay){
  const needs=SHOP_NEEDS[chId]||{};const stock={};
  for(let day=1;day<targetDay;day++){
    const dn=needs[day]||{};const bought=state.checkedItems[chId+'-shop-'+day]||[];
    Object.entries(dn).forEach(([key,need])=>{
      if(!stock[key])stock[key]=0;
      if(bought.includes(key)){
        const cat=PANTRY_CATALOG[key];if(!cat)return;
        const deficit=Math.max(0,need-stock[key]);
        stock[key]+=Math.ceil(deficit/cat.storeQty)*cat.storeQty;
      }
    });
    Object.entries(dn).forEach(([key,need])=>{
      if(stock[key])stock[key]=Math.max(0,stock[key]-need);
    });
  }
  return stock;
}
function fmtQty(val,unit){
  if(unit==='g'&&val>=1000)return (val/1000)+'kg';
  if(unit==='ml'&&val>=1000)return (val/1000)+'L';
  if(unit==='un')return val+(val===1?' unidad':' unidades');
  return val+unit;
}
function renderShopping(){
  const ch=getChallenge();const currentDay=getNextDay();const chId=state.activeChallenge;
  const needs=SHOP_NEEDS[chId]||{};const container=document.getElementById('shopDays');
  let html='';
  ch.days.forEach(d=>{
    const dayNeeds=needs[d.day]||{};
    if(Object.keys(dayNeeds).length===0)return;
    const isCurrent=d.day===currentDay;
    const stock=calcStockAtDay(chId,d.day);
    const buyKey=chId+'-shop-'+d.day;
    const bought=state.checkedItems[buyKey]||[];
    let itemsHtml='';let toBuyCount=0;
    Object.entries(dayNeeds).forEach(([key,need])=>{
      const cat=PANTRY_CATALOG[key];if(!cat)return;
      const have=stock[key]||0;
      if(have>=need){
        itemsHtml+=`<div class="shop-item" style="opacity:0.5">
          <div class="shop-check checked" style="background:var(--sage);border-color:var(--sage)">✓</div>
          <div class="shop-name" style="color:var(--stone)">${cat.label}</div>
          <div class="shop-qty" style="color:var(--sage)">Tienes ${fmtQty(have,cat.unit)}</div></div>`;
      } else {
        const deficit=need-have;const units=Math.ceil(deficit/cat.storeQty);
        const isBought=bought.includes(key);
        if(!isBought)toBuyCount++;
        const label=cat.label+(cat.brand?' ('+cat.brand+')':'');
        itemsHtml+=`<div class="shop-item" data-day="${d.day}" data-key="${key}">
          <div class="shop-check${isBought?' checked':''}">${isBought?'✓':''}</div>
          <div class="shop-name${isBought?' checked':''}">${label}
            <div style="font-size:0.7rem;color:var(--stone);margin-top:2px;font-weight:400">
              Necesitas ${fmtQty(need,cat.unit)}${have>0?' · tienes '+fmtQty(have,cat.unit):''}</div></div>
          <div class="shop-qty">${units>1?units+'× ':''}${cat.storeLabel}</div></div>`;
      }
    });
    const statusText=toBuyCount===0?'Todo listo':toBuyCount+' por comprar';
    html+=`<div class="shop-day-card${isCurrent?' open current':''}" data-shop-day="${d.day}">
      <div class="shop-day-header"><div class="shop-day-num">${d.day}</div>
        <div class="shop-day-info"><div class="shop-day-title">${d.title}</div>
          <div class="shop-day-count">${statusText}</div></div>
        <span class="shop-day-chevron">›</span></div>
      <div class="shop-day-body"><div class="shop-day-items">${itemsHtml}</div></div></div>`;
  });
  container.innerHTML=html;
  container.querySelectorAll('.shop-day-header').forEach(h=>{
    h.addEventListener('click',()=>h.parentElement.classList.toggle('open'))});
  container.querySelectorAll('.shop-item[data-key]').forEach(item=>{
    item.addEventListener('click',()=>{
      const day=item.dataset.day;const key=item.dataset.key;const bk=chId+'-shop-'+day;
      if(!state.checkedItems[bk])state.checkedItems[bk]=[];
      const arr=state.checkedItems[bk];
      if(arr.includes(key))state.checkedItems[bk]=arr.filter(k=>k!==key);
      else arr.push(key);saveState();renderShopping()});
  });
}

function renderTimers(){
  const c=document.getElementById('timerContainer');const circ=2*Math.PI*90;
  const off=timerState.totalSec>0?circ*(1-timerState.remainSec/timerState.totalSec):0;
  const mm=String(Math.floor(timerState.remainSec/60)).padStart(2,'0');
  const ss=String(timerState.remainSec%60).padStart(2,'0');
  const isDone=timerState.totalSec>0&&timerState.remainSec===0&&!timerState.running;
  c.innerHTML=`
    <div class="timer-ring-wrap"><svg viewBox="0 0 200 200" class="timer-svg">
      <circle cx="100" cy="100" r="90" class="timer-bg"/>
      <circle cx="100" cy="100" r="90" class="timer-progress" stroke-dasharray="${circ}" stroke-dashoffset="${off}" ${isDone?'style="stroke:var(--danger)"':''}/></svg>
      <div class="timer-center"><div class="timer-time${isDone?' timer-done':''}">${mm}:${ss}</div>
        <div class="timer-name">${timerState.name||'Selecciona un timer'}</div></div></div>
    <div class="timer-controls">
      <button class="timer-ctrl reset" id="timerReset">↺</button>
      <button class="timer-ctrl play" id="timerPlay">${timerState.running?'⏸':'▶'}</button></div>
    <div class="timer-presets">${TIMER_PRESETS.map(p=>`<button class="preset-btn${timerState.name===p.name?' active-preset':''}" data-name="${p.name}" data-min="${p.min}">
      <div class="preset-name">${p.emoji} ${p.name}</div><div class="preset-time">${p.min} min</div></button>`).join('')}</div>
    <div class="custom-timer-row"><input type="number" class="custom-input" id="customMin" placeholder="Minutos" min="1" max="999">
      <button class="btn btn-primary" id="customStart" style="flex:0 0 auto;padding:12px 20px">Iniciar</button></div>`;
  c.querySelectorAll('.preset-btn').forEach(b=>{b.addEventListener('click',()=>startTimerPreset(b.dataset.name,parseInt(b.dataset.min)))});
  document.getElementById('timerPlay').addEventListener('click',toggleTimer);
  document.getElementById('timerReset').addEventListener('click',resetTimer);
  document.getElementById('customStart').addEventListener('click',()=>{const m=parseInt(document.getElementById('customMin').value);if(m>0)startTimerPreset('Personalizado',m)});
}
function startTimerPreset(n,m){clearInterval(timerState.interval);timerState={running:true,paused:false,name:n,totalSec:m*60,remainSec:m*60,interval:null};timerState.interval=setInterval(tickTimer,1000);renderTimers();requestNotificationPermission()}
function toggleTimer(){if(timerState.totalSec===0)return;if(timerState.running){clearInterval(timerState.interval);timerState.running=false;timerState.paused=true}else if(timerState.remainSec>0){timerState.running=true;timerState.paused=false;timerState.interval=setInterval(tickTimer,1000)}renderTimers()}
function resetTimer(){clearInterval(timerState.interval);timerState={running:false,paused:false,name:'',totalSec:0,remainSec:0,interval:null};renderTimers();document.title='Pan de Casa'}
function tickTimer(){if(timerState.remainSec>0){timerState.remainSec--;updateTimerDisplay();if(timerState.remainSec===0){clearInterval(timerState.interval);timerState.running=false;onTimerDone()}}}
function updateTimerDisplay(){const mm=String(Math.floor(timerState.remainSec/60)).padStart(2,'0');const ss=String(timerState.remainSec%60).padStart(2,'0');const te=document.querySelector('.timer-time');if(te)te.textContent=mm+':'+ss;const circ=2*Math.PI*90;const off=circ*(1-timerState.remainSec/timerState.totalSec);const p=document.querySelector('.timer-progress');if(p)p.setAttribute('stroke-dashoffset',off);document.title=mm+':'+ss+' — Pan de Casa'}
function onTimerDone(){playChime();sendNotification('⏱️ ¡'+timerState.name+' listo!','Tu '+timerState.name.toLowerCase()+' ha terminado.');renderTimers();document.title='Pan de Casa'}

// ═══ AUDIO ═══
function playChime(){try{const x=new(window.AudioContext||window.webkitAudioContext)();[523,659,784,1047].forEach((f,i)=>{const o=x.createOscillator();const g=x.createGain();o.connect(g);g.connect(x.destination);o.frequency.value=f;o.type='sine';const t=x.currentTime+i*0.18;g.gain.setValueAtTime(0.18,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.6);o.start(t);o.stop(t+0.6)})}catch(e){}}

// ═══ NOTIFICATIONS ═══
function requestNotificationPermission(){if('Notification'in window&&Notification.permission==='default')Notification.requestPermission()}
function sendNotification(t,b){if('Notification'in window&&Notification.permission==='granted')new Notification(t,{body:b})}

// ═══ CHAT ═══
function renderChat(){
  const c=document.getElementById('chatContainer');
  if(!state.apiKey){
    c.innerHTML=`<div class="api-setup"><svg width="48" height="48" viewBox="0 0 48 48" fill="none"><path d="M36 20c0 7.7-7 14-15.5 14a17 17 0 01-6.9-1.4L6 36l3.1-6.9A13 13 0 016 20C6 12.3 13 6 20.5 6S36 12.3 36 20z" fill="#D4A07A" stroke="#C4713B" stroke-width="2"/><circle cx="15" cy="20" r="1.5" fill="#C4713B"/><circle cx="21" cy="20" r="1.5" fill="#C4713B"/><circle cx="27" cy="20" r="1.5" fill="#C4713B"/></svg><h3>Tu Asistente Panadero</h3>
      <p>Conecta tu API key de Anthropic para hacer preguntas. El chat sabe tu día, receta y estado del starter.</p>
      <input type="password" class="api-input" id="apiKeyInput" placeholder="sk-ant-...">
      <button class="btn btn-primary" id="saveApiKey" style="width:100%;max-width:320px">Guardar API Key</button>
      <p class="api-note">Se guarda solo en tu teléfono. Consíguela en console.anthropic.com</p></div>`;
    document.getElementById('saveApiKey').addEventListener('click',()=>{const k=document.getElementById('apiKeyInput').value.trim();if(k){state.apiKey=k;saveState();renderChat()}});return}
  const ch=getChallenge();const day=ch.days[getNextDay()-1];const act=getStarterActivity();
  const msgs=state.chatHistory.map(m=>`<div class="chat-msg ${m.role}">${m.role==='assistant'?fmtMd(m.content):escH(m.content)}</div>`).join('');
  const sugs=getSuggestions();
  c.innerHTML=`
    <div class="context-banner"><strong>${ch.name} — Día ${day.day}:</strong> ${day.title} · ${act.label}</div>
    <div class="api-saved"><span class="api-status">✓ API conectada</span><button class="api-change" id="changeKey">cambiar</button>
      <button class="api-change" id="clearChat" style="color:var(--danger)">limpiar chat</button></div>
    <div class="chat-messages" id="chatMessages">
      ${msgs||'<div class="chat-msg system">¡Hola! Soy tu asistente panadero. Pregúntame sobre recetas, técnicas, o tu masa madre. Tengo contexto de tu progreso.</div>'}</div>
    <div class="chat-suggestions" id="chatSuggestions">${sugs.map(s=>`<button class="chat-suggest">${s}</button>`).join('')}</div>
    <div class="chat-input-area"><input type="text" class="chat-input" id="chatInput" placeholder="Pregunta algo..." autocomplete="off">
      <button class="chat-send" id="chatSend">➤</button></div>`;
  document.getElementById('changeKey').addEventListener('click',()=>{state.apiKey='';saveState();renderChat()});
  document.getElementById('clearChat').addEventListener('click',()=>{state.chatHistory=[];saveState();renderChat()});
  const inp=document.getElementById('chatInput');
  document.getElementById('chatSend').addEventListener('click',()=>sendChat());
  inp.addEventListener('keydown',e=>{if(e.key==='Enter')sendChat()});
  document.querySelectorAll('.chat-suggest').forEach(b=>{b.addEventListener('click',()=>{inp.value=b.textContent;sendChat()})});
  scrollChat();
}
function getSuggestions(){
  const d=getNextDay();const isPeru=state.activeChallenge==='pan-peruano';
  if(isPeru)return['Tips para la receta de hoy','¿Dónde consigo chancaca?','¿Cómo hago la miel?','Sustitutos de ingredientes'];
  if(d<=2)return['¿Cómo sé si amasé suficiente?','Tips para mi primer pan'];
  if(d<=7)return['¿Cómo alimentar mi starter?','¿Es normal este olor?'];
  return['Tips para sourdough','¿Cómo hago el scoring?'];
}
async function sendChat(){
  const inp=document.getElementById('chatInput');const msg=inp.value.trim();if(!msg)return;inp.value='';
  state.chatHistory.push({role:'user',content:msg});saveState();renderChatMsgs();
  const me=document.getElementById('chatMessages');const ty=document.createElement('div');
  ty.className='chat-typing';ty.innerHTML='<div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>';
  me.appendChild(ty);scrollChat();
  try{
    const ch=getChallenge();const day=ch.days[getNextDay()-1];const act=getStarterActivity();
    const sys=`Eres un panadero experto peruano, cálido y motivador. Guías a un principiante en un reto de 14 días. El usuario compra en Plaza Vea o Metro (Perú).

CONTEXTO:
- Reto activo: ${ch.name} (${ch.subtitle})
- Día actual: ${day.day}/14 — ${day.title}: ${day.subtitle}
- Ingredientes de hoy: ${day.ingredients.filter(i=>i!=='').join(', ')}
- Masa madre: ${act.label} (${act.desc}), ${state.starterFeedings.length} alimentaciones
- Días completados: ${getCompleted().sort((a,b)=>a-b).join(', ')||'ninguno'}

Responde en español, conciso (2-3 párrafos max). Temperaturas en °C. Marcas de Plaza Vea/Metro. Tono amigable.`;
    const messages=state.chatHistory.slice(-16).map(m=>({role:m.role,content:m.content}));
    const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':state.apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:1024,system:sys,messages})});
    if(!r.ok){const e=await r.json().catch(()=>({}));throw new Error(e.error?.message||'Error '+r.status)}
    const data=await r.json();ty.remove();
    state.chatHistory.push({role:'assistant',content:data.content[0]?.text||'Error'});saveState();renderChatMsgs();
  }catch(err){ty.remove();state.chatHistory.push({role:'assistant',content:'❌ '+err.message});saveState();renderChatMsgs()}}
function renderChatMsgs(){const el=document.getElementById('chatMessages');if(!el)return;
  el.innerHTML=state.chatHistory.map(m=>`<div class="chat-msg ${m.role}">${m.role==='assistant'?fmtMd(m.content):escH(m.content)}</div>`).join('');
  scrollChat();const s=document.getElementById('chatSuggestions');if(s&&state.chatHistory.length)s.style.display='none'}
function scrollChat(){const el=document.getElementById('chatMessages');if(el)setTimeout(()=>el.scrollTop=el.scrollHeight,50)}
function escH(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function fmtMd(t){let h=escH(t);h=h.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');h=h.replace(/`(.+?)`/g,'<code>$1</code>');
  h=h.split('\n\n').map(p=>'<p>'+p+'</p>').join('');h=h.replace(/\n/g,'<br>');h=h.replace(/<br>- /g,'<br>• ');return h}

// ═══ PWA ═══
function setupPWA(){
  const m={name:'Pan de Casa',short_name:'Pan de Casa',start_url:'.',display:'standalone',background_color:'#1A0F0A',theme_color:'#1A0F0A',orientation:'portrait',
    icons:[{src:'data:image/svg+xml,'+encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512"><rect width="512" height="512" rx="100" fill="#1A0F0A"/><ellipse cx="256" cy="280" rx="180" ry="120" fill="#D4A07A" stroke="#C4713B" stroke-width="12"/><path d="M140 250c40-70 90-90 116-90s76 20 116 90" fill="none" stroke="#C4713B" stroke-width="8" stroke-linecap="round"/><line x1="256" y1="170" x2="256" y2="260" stroke="#C4713B" stroke-width="8" stroke-linecap="round"/></svg>'),sizes:'512x512',type:'image/svg+xml',purpose:'any'}]};
  const l=document.createElement('link');l.rel='manifest';l.href=URL.createObjectURL(new Blob([JSON.stringify(m)],{type:'application/json'}));document.head.appendChild(l)}

// ═══ INIT ═══
setupPWA();updateHeader();renderChallengeTabs();renderPlan();
if(state.remindersOn)setupReminders();
if(state.currentTab&&state.currentTab!=='plan'){const b=document.querySelector(`[data-page="${state.currentTab}"]`);if(b)b.click()}
</script>
