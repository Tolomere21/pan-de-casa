<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="theme-color" content="#1A0F0A">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>Pan de Casa</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&family=Literata:opsz,wght@7..72,400;7..72,600;7..72,700&family=Outfit:wght@300;400;500;600;700&family=Caveat:wght@400;600&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --cloud:#1A0F0A;--snow:#2C1D12;--linen:#5C3D2E;
  --clay:#C4713B;--clay-light:#D4A07A;--clay-pale:rgba(196,113,59,0.15);
  --bark:#E8D5B7;--stone:#A68B6B;--sage:#7DB867;
  --danger:#C25B4A;--shadow:rgba(0,0,0,0.25);
  --radius:20px;--radius-sm:12px;--nav-h:72px;
  --doodle-stroke:#5C3D2E;
}
html{height:100%;-webkit-text-size-adjust:100%}
body{
  font-family:'Outfit',sans-serif;background:var(--cloud);color:var(--bark);
  min-height:100%;overscroll-behavior:none;position:relative;
  -webkit-tap-highlight-color:transparent;font-weight:400;
  background-image:url("data:image/svg+xml,%3Csvg width='400' height='400' viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' stroke='%235C3D2E' stroke-width='0.8' opacity='0.25'%3E%3Ccircle cx='50' cy='50' r='8'/%3E%3Ccircle cx='50' cy='50' r='3'/%3E%3Cpath d='M150 30 Q160 20 170 30 Q180 40 190 30'/%3E%3Cpath d='M280 60 L290 50 L300 60 L290 70Z'/%3E%3Cpath d='M350 150 Q355 140 365 145 Q370 155 360 158 Q350 155 350 150'/%3E%3Ccircle cx='80' cy='180' r='5'/%3E%3Cpath d='M200 200 L205 195 M210 200 L215 195 M220 200 L225 195'/%3E%3Cpath d='M30 280 Q40 270 50 280 T70 280'/%3E%3Ccircle cx='320' cy='280' r='6'/%3E%3Ccircle cx='320' cy='280' r='2'/%3E%3Cpath d='M150 350 L160 340 L170 350'/%3E%3Cpath d='M370 350 Q375 345 380 350 Q375 355 370 350'/%3E%3Cpath d='M100 120 Q105 115 110 120 Q115 125 120 120'/%3E%3Cpath d='M250 140 L255 130 L260 140 L250 140'/%3E%3Ccircle cx='180' cy='100' r='4'/%3E%3Cpath d='M300 200 Q310 195 315 205 Q310 210 300 205'/%3E%3Cpath d='M60 350 L65 345 L70 350 L65 355Z'/%3E%3Cpath d='M230 300 Q240 290 250 300'/%3E%3Ccircle cx='130' cy='250' r='3'/%3E%3Cpath d='M380 100 L385 95 L390 100'/%3E%3C/g%3E%3C/svg%3E");
}
body::after{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:9999;opacity:0.03;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size:200px 200px;
}
.app-header{
  position:sticky;top:0;z-index:50;
  background:var(--cloud);
  padding:14px 20px;padding-top:calc(14px + env(safe-area-inset-top,0px));
  border-bottom:1px solid var(--linen);
}
.header-top{display:flex;align-items:center;justify-content:space-between}
.header-brand{display:flex;align-items:center;gap:10px}
.header-title{font-family:'Patrick Hand',cursive;font-weight:400;font-size:1.5rem;color:var(--bark);letter-spacing:0.01em}
.header-day{font-size:0.78rem;color:var(--stone);font-weight:500;font-family:'Outfit',sans-serif}
.journey-bar{height:3px;background:var(--linen);border-radius:2px;margin-top:10px;overflow:hidden}
.journey-fill{height:100%;background:linear-gradient(90deg,var(--clay),var(--clay-light));border-radius:50% 20%/10% 40%;transition:width 0.6s ease;width:0%;background-image:repeating-linear-gradient(45deg,transparent,transparent 2px,rgba(255,255,255,0.1) 2px,rgba(255,255,255,0.1) 4px)}
.app-main{position:relative;min-height:calc(100vh - 140px);padding-bottom:calc(var(--nav-h) + env(safe-area-inset-bottom,0px) + 8px)}
.page{display:none;padding:20px 20px 28px;animation:pageIn 0.4s ease}
.page.active{display:block}
@keyframes pageIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.page-title{font-family:'Patrick Hand',cursive;font-size:1.5rem;font-weight:400;margin-bottom:18px;color:var(--bark)}
.page-subtitle{font-size:0.82rem;color:var(--stone);margin-top:-12px;margin-bottom:18px;font-weight:400}
.bottom-nav{
  position:fixed;bottom:0;left:0;right:0;z-index:50;
  background:var(--snow);display:flex;
  padding-bottom:env(safe-area-inset-bottom,0px);
  box-shadow:0 -1px 12px rgba(0,0,0,0.3);
  border-top:1px solid var(--linen);
}
.nav-btn{
  flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;
  padding:10px 2px 8px;border:none;background:none;cursor:pointer;
  transition:all 0.2s;position:relative;color:var(--stone);
}
.nav-icon{display:flex;align-items:center;justify-content:center;width:24px;height:24px;transition:all 0.2s}
.nav-icon svg{width:22px;height:22px}
.nav-label{font-size:0.6rem;font-weight:500;color:var(--stone);transition:color 0.2s;letter-spacing:0.02em;font-family:'Outfit',sans-serif}
.nav-btn.active{color:var(--clay)}
.nav-btn.active .nav-label{color:var(--clay)}
.nav-btn.active::after{
  content:'';position:absolute;bottom:calc(env(safe-area-inset-bottom,0px) + 2px);left:35%;right:35%;height:3px;
  background:var(--clay);border-radius:2px;
}
.card{
  background:var(--snow);border-radius:var(--radius);padding:20px;
  margin-bottom:14px;box-shadow:0 2px 12px var(--shadow);
  border:2px solid var(--linen);transition:transform 0.15s,box-shadow 0.15s;
  cursor:pointer;
}
.card:active{transform:scale(0.985);box-shadow:0 1px 6px var(--shadow)}
.day-card{display:flex;align-items:center;gap:16px;position:relative;border-left:3px solid var(--clay-light);padding-left:18px;border-radius:var(--radius)}
.day-num{
  font-family:'Literata',serif;font-size:1.1rem;font-weight:700;color:var(--clay);
  min-width:42px;height:42px;display:flex;align-items:center;justify-content:center;
  background:var(--clay-pale);border-radius:50%;line-height:1;flex-shrink:0;
}
.day-info{flex:1}
.day-title{font-family:'Patrick Hand',cursive;font-weight:400;font-size:1.05rem;color:var(--bark);display:flex;align-items:center;gap:6px}
.day-subtitle{font-size:0.78rem;color:var(--stone);margin-top:3px;font-weight:400}
.day-meta{display:flex;align-items:center;gap:10px;margin-top:8px;font-size:0.7rem;color:var(--stone)}
.day-dots{display:flex;gap:3px}
.day-dot{width:5px;height:5px;border-radius:50%;background:var(--linen)}
.day-dot.filled{background:var(--clay)}
.day-check{
  width:28px;height:28px;border-radius:50%;border:2px solid var(--linen);
  display:flex;align-items:center;justify-content:center;font-size:0.8rem;
  transition:all 0.3s;flex-shrink:0;
}
.day-check.done{background:var(--sage);border-color:var(--sage);color:white}
.day-card.completed{opacity:0.55}
.starter-badge{font-size:0.68rem;background:var(--clay-pale);padding:2px 8px;border-radius:10px;color:var(--clay);font-weight:500}
/* Challenge selector */
.challenge-tabs{display:flex;gap:10px;margin-bottom:20px;overflow-x:auto;scrollbar-width:none;padding:2px}
.challenge-tabs::-webkit-scrollbar{display:none}
.challenge-tab{
  flex:1;min-width:140px;padding:16px;border-radius:var(--radius);border:1.5px solid var(--linen);
  background:var(--snow);cursor:pointer;transition:all 0.2s;text-align:center;
}
.challenge-tab.active{border-color:var(--clay);background:rgba(196,113,59,0.15)}
.challenge-tab .ct-emoji{font-size:1.4rem}
.challenge-tab .ct-name{font-family:'Patrick Hand',cursive;font-weight:400;font-size:1rem;margin-top:4px;color:var(--bark)}
.challenge-tab .ct-progress{font-size:0.7rem;color:var(--stone);margin-top:3px}
/* Sheet */
.sheet-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);opacity:0;pointer-events:none;transition:opacity 0.3s;z-index:99}
.sheet-overlay.active{opacity:1;pointer-events:auto}
.recipe-sheet{
  position:fixed;bottom:0;left:0;right:0;max-height:88vh;
  background:var(--snow);border-radius:24px 24px 0 0;border-top:2px solid var(--linen);
  transform:translateY(100%);transition:transform 0.35s cubic-bezier(0.4,0,0.2,1);
  overflow-y:auto;z-index:100;padding:20px 24px calc(24px + env(safe-area-inset-bottom,0px));
  -webkit-overflow-scrolling:touch;
}
.recipe-sheet.active{transform:translateY(0)}
.sheet-handle{width:36px;height:4px;background:var(--linen);border-radius:2px;margin:0 auto 18px}
.sheet-title{font-family:'Patrick Hand',cursive;font-size:1.5rem;font-weight:400;margin-bottom:4px;color:var(--bark)}
.sheet-subtitle{font-size:0.82rem;color:var(--stone);margin-bottom:22px}
.sheet-section{margin-bottom:24px}
.sheet-section h3{font-family:'Literata',serif;font-size:0.95rem;font-weight:600;margin-bottom:12px;color:var(--stone);display:flex;align-items:center;gap:8px}
.ingredient-list{list-style:none}
.ingredient-list li{padding:8px 0;border-bottom:1px solid rgba(92,61,46,0.3);font-size:0.88rem;display:flex;align-items:center;gap:8px}
.ingredient-list li::before{content:'·';color:var(--clay);font-weight:bold;font-size:1.2rem}
.step-list{list-style:none;counter-reset:step}
.step-list li{counter-increment:step;padding:10px 0 10px 40px;border-bottom:1px solid rgba(92,61,46,0.3);font-size:0.86rem;position:relative;line-height:1.6}
.step-list li::before{
  content:counter(step);position:absolute;left:0;top:10px;
  width:26px;height:26px;border-radius:50%;background:var(--clay-pale);color:var(--clay);
  font-size:0.72rem;font-weight:700;display:flex;align-items:center;justify-content:center;
  font-family:'Literata',serif;
}
.sheet-tip{
  background:rgba(196,113,59,0.1);border-left:3px solid var(--clay-light);
  padding:14px 16px;border-radius:0 var(--radius-sm) var(--radius-sm) 0;
  font-family:'Caveat',cursive;font-size:1.05rem;color:var(--stone);line-height:1.4;
}
.sheet-timers{display:flex;flex-wrap:wrap;gap:8px}
.sheet-timer-btn{
  padding:10px 16px;border-radius:24px;border:1.5px solid var(--clay-light);
  background:rgba(196,113,59,0.12);color:var(--bark);font-size:0.78rem;
  font-weight:500;cursor:pointer;transition:all 0.2s;font-family:'Outfit',sans-serif;
}
.sheet-timer-btn:active{background:var(--clay);color:white;border-color:var(--clay)}
/* Starter */
.starter-container{display:flex;flex-direction:column;align-items:center;gap:24px}
.jar-wrapper{position:relative;width:160px;height:230px}
.jar-svg{width:100%;height:100%}
.bubble{
  position:absolute;border-radius:50%;
  background:radial-gradient(circle at 30% 30%,rgba(196,113,59,0.2),rgba(196,113,59,0.08));
  border:1px solid rgba(196,113,59,0.15);animation:rise var(--dur,4s) ease-in-out infinite;
  animation-delay:var(--del,0s);
}
@keyframes rise{0%{transform:translateY(0) scale(1);opacity:0}10%{opacity:0.6}90%{opacity:0.4}100%{transform:translateY(calc(-1 * var(--travel,150px))) scale(0.4);opacity:0}}
.starter-status{text-align:center}
.starter-level{font-family:'Patrick Hand',cursive;font-size:1.4rem;font-weight:400;color:var(--bark)}
.starter-sublevel{font-size:0.82rem;color:var(--stone);margin-top:3px}
.btn{
  flex:1;padding:13px 18px;border-radius:var(--radius-sm);border:none;
  font-family:'Outfit',sans-serif;font-weight:600;font-size:0.88rem;
  cursor:pointer;transition:all 0.2s;
}
.btn-primary{background:var(--clay);color:#FBF7F2;box-shadow:0 2px 10px rgba(196,113,59,0.35);border-radius:24px}
.btn-primary:active{background:#A85E30;transform:scale(0.97)}
.btn-secondary{background:var(--snow);color:var(--bark);border:1.5px solid var(--linen);border-radius:24px}
.btn-secondary:active{background:var(--linen);color:var(--cloud)}
.starter-actions{display:flex;gap:10px;width:100%;max-width:360px}
.starter-timeline{display:flex;gap:5px;width:100%;overflow-x:auto;padding:8px 0;scrollbar-width:none;-webkit-overflow-scrolling:touch;justify-content:center;flex-wrap:wrap}
.starter-timeline::-webkit-scrollbar{display:none}
.timeline-day{
  min-width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-size:0.65rem;font-weight:600;border:2px solid var(--linen);color:var(--stone);flex-shrink:0;transition:all 0.3s;
}
.timeline-day.fed{background:var(--sage);border-color:var(--sage);color:white}
.timeline-day.today{border-color:var(--clay);color:var(--clay)}
.timeline-day.today.fed{background:var(--clay);border-color:var(--clay);color:white}
.notes-input{
  width:100%;max-width:360px;padding:12px 16px;border:1.5px solid var(--linen);border-radius:var(--radius-sm);
  font-family:'Caveat',cursive;font-size:1rem;background:var(--snow);color:var(--bark);
  resize:none;outline:none;transition:border-color 0.2s;
}
.notes-input:focus{border-color:var(--clay)}
.feed-entry{padding:12px 0;border-bottom:1px solid rgba(92,61,46,0.3);display:flex;align-items:flex-start;gap:12px;font-size:0.85rem}
.feed-time{color:var(--clay);font-weight:600;min-width:60px;font-size:0.76rem}
.feed-notes{color:var(--stone);font-family:'Caveat',cursive;font-size:1rem}
/* Guide cards */
.guide-card{background:var(--snow);border-radius:var(--radius);margin-bottom:10px;border:2px solid var(--linen);overflow:hidden;width:100%;max-width:400px}
.guide-header{padding:16px 18px;font-weight:600;font-size:0.88rem;display:flex;justify-content:space-between;align-items:center;cursor:pointer;color:var(--bark)}
.guide-header::after{content:'›';color:var(--stone);transition:transform 0.3s;font-size:1rem}
.guide-card.open .guide-header::after{transform:rotate(90deg)}
.guide-body{max-height:0;overflow:hidden;transition:max-height 0.35s ease;padding:0 18px}
.guide-card.open .guide-body{max-height:600px;padding:0 18px 16px}
.guide-body p{font-size:0.84rem;line-height:1.65;margin-bottom:6px;color:var(--stone)}
.guide-body strong{color:var(--bark)}
.guide-measure{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--linen);border-radius:var(--radius-sm);margin:6px 0;font-size:0.86rem;font-weight:600}
.guide-measure .gm-qty{color:var(--clay);min-width:50px;font-family:'Literata',serif;font-size:1.1rem}
/* Reminder */
.reminder-row{display:flex;align-items:center;gap:10px;width:100%;max-width:360px;flex-wrap:wrap}
.time-input{padding:10px;border:1.5px solid var(--linen);border-radius:var(--radius-sm);font-family:'Outfit',sans-serif;font-size:0.88rem;background:var(--snow);outline:none;width:100px;text-align:center}
.time-input:focus{border-color:var(--clay)}
.reminder-label{font-size:0.8rem;color:var(--stone);font-weight:600;min-width:60px}
.reminder-toggle{
  width:48px;height:28px;border-radius:14px;border:none;cursor:pointer;
  background:var(--linen);position:relative;transition:background 0.3s;
}
.reminder-toggle.on{background:var(--sage)}
.reminder-toggle::after{
  content:'';position:absolute;top:3px;left:3px;width:22px;height:22px;
  border-radius:50%;background:white;transition:transform 0.3s;box-shadow:0 1px 4px rgba(0,0,0,0.12);
}
.reminder-toggle.on::after{transform:translateX(20px)}
/* Shopping */
.shop-day-card{background:var(--snow);border-radius:var(--radius);margin-bottom:12px;border:2px solid var(--linen);overflow:hidden;box-shadow:0 2px 8px var(--shadow)}
.shop-day-header{padding:16px 20px;display:flex;align-items:center;gap:14px;cursor:pointer;transition:background 0.2s}
.shop-day-header:active{background:rgba(92,61,46,0.15)}
.shop-day-num{width:36px;height:36px;border-radius:50%;background:var(--clay-pale);display:flex;align-items:center;justify-content:center;font-family:'Literata',serif;font-weight:700;font-size:0.9rem;color:var(--clay);flex-shrink:0}
.shop-day-info{flex:1}
.shop-day-title{font-family:'Patrick Hand',cursive;font-weight:400;font-size:1rem;color:var(--bark)}
.shop-day-count{font-size:0.72rem;color:var(--stone);margin-top:2px}
.shop-day-chevron{color:var(--stone);transition:transform 0.3s;font-size:0.8rem}
.shop-day-card.open .shop-day-chevron{transform:rotate(90deg)}
.shop-day-body{max-height:0;overflow:hidden;transition:max-height 0.35s ease}
.shop-day-card.open .shop-day-body{max-height:800px}
.shop-day-items{padding:0 20px 16px}
.shop-day-card.current{border-left:3px solid var(--clay)}
.shop-item{display:flex;align-items:center;gap:14px;padding:14px 0;border-bottom:1px solid rgba(92,61,46,0.25)}
.shop-check{
  width:22px;height:22px;border-radius:8px;border:2px solid var(--linen);
  display:flex;align-items:center;justify-content:center;cursor:pointer;
  transition:all 0.2s;flex-shrink:0;font-size:0.72rem;
}
.shop-check.checked{background:var(--sage);border-color:var(--sage);color:white}
.shop-name{flex:1;font-size:0.88rem}
.shop-name.checked{text-decoration:line-through;color:var(--stone)}
.shop-qty{font-size:0.76rem;color:var(--stone);font-weight:500;white-space:nowrap}
.shop-progress{font-size:0.76rem;color:var(--stone);text-align:right;margin-bottom:14px}
/* Timer */
.timer-container{display:flex;flex-direction:column;align-items:center;gap:28px;padding-top:12px}
.timer-ring-wrap{position:relative;width:220px;height:220px}
.timer-svg{width:100%;height:100%;transform:rotate(-90deg)}
.timer-bg{fill:none;stroke:var(--linen);stroke-width:7}
.timer-progress{fill:none;stroke:var(--clay);stroke-width:7;stroke-linecap:round;transition:stroke-dashoffset 0.5s linear}
.timer-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.timer-time{font-family:'Patrick Hand',cursive;font-size:3rem;font-weight:400;color:var(--bark);letter-spacing:0}
.timer-name{font-size:0.82rem;color:var(--stone);font-weight:500;margin-top:4px}
.timer-controls{display:flex;gap:14px}
.timer-ctrl{width:52px;height:52px;border-radius:50%;border:none;display:flex;align-items:center;justify-content:center;font-size:1.2rem;cursor:pointer;transition:all 0.2s}
.timer-ctrl.play{background:var(--clay);color:white;box-shadow:0 3px 14px rgba(196,113,59,0.4)}
.timer-ctrl.play:active{transform:scale(0.92)}
.timer-ctrl.reset{background:var(--snow);border:2px solid var(--linen);color:var(--stone)}
.timer-presets{display:grid;grid-template-columns:1fr 1fr;gap:10px;width:100%;max-width:360px}
.preset-btn{padding:16px;border-radius:var(--radius);border:1.5px solid rgba(92,61,46,0.3);background:var(--snow);cursor:pointer;transition:all 0.2s;text-align:left}
.preset-btn:active{border-color:var(--clay);background:rgba(196,113,59,0.1)}
.preset-btn.active-preset{border-color:var(--clay);background:rgba(196,113,59,0.15)}
.preset-name{font-weight:600;font-size:0.86rem;color:var(--bark)}
.preset-time{font-size:0.76rem;color:var(--stone);margin-top:3px}
.timer-done{animation:pulse 0.6s ease infinite alternate}
@keyframes pulse{from{opacity:1}to{opacity:0.5}}
.custom-timer-row{display:flex;gap:8px;width:100%;max-width:360px;align-items:center}
.custom-input{flex:1;padding:13px;border-radius:var(--radius-sm);border:1.5px solid var(--linen);font-family:'Outfit',sans-serif;font-size:0.88rem;text-align:center;background:var(--snow);outline:none}
.custom-input:focus{border-color:var(--clay)}
/* Chat */
.chat-container{display:flex;flex-direction:column;height:calc(100vh - 140px - env(safe-area-inset-top,0px) - env(safe-area-inset-bottom,0px))}
.chat-messages{flex:1;overflow-y:auto;padding:8px 0;-webkit-overflow-scrolling:touch;display:flex;flex-direction:column;gap:12px}
.chat-msg{max-width:85%;padding:14px 18px;border-radius:20px;font-size:0.88rem;line-height:1.55;word-wrap:break-word}
.chat-msg.user{align-self:flex-end;background:var(--clay);color:white;border-bottom-right-radius:6px}
.chat-msg.assistant{align-self:flex-start;background:#3D2517;color:var(--bark);border-bottom-left-radius:6px;box-shadow:0 2px 8px var(--shadow);border:1px solid var(--linen)}
.chat-msg.system{align-self:center;background:rgba(196,113,59,0.15);color:var(--stone);font-size:0.78rem;text-align:center;border-radius:var(--radius-sm);max-width:95%}
.chat-msg.assistant p{margin:0 0 8px}.chat-msg.assistant p:last-child{margin:0}
.chat-msg.assistant strong{color:var(--clay)}
.chat-typing{align-self:flex-start;padding:14px 22px;display:flex;gap:4px}
.typing-dot{width:7px;height:7px;border-radius:50%;background:var(--clay-light);animation:typingBounce 1.4s ease-in-out infinite}
.typing-dot:nth-child(2){animation-delay:0.2s}.typing-dot:nth-child(3){animation-delay:0.4s}
@keyframes typingBounce{0%,60%,100%{transform:translateY(0);opacity:0.4}30%{transform:translateY(-8px);opacity:1}}
.chat-input-area{display:flex;gap:8px;padding:14px 0 4px;border-top:1px solid rgba(92,61,46,0.3)}
.chat-input{flex:1;padding:12px 18px;border-radius:24px;border:1.5px solid var(--linen);font-family:'Outfit',sans-serif;font-size:0.88rem;background:var(--snow);outline:none;transition:border-color 0.2s}
.chat-input:focus{border-color:var(--clay)}
.chat-send{width:44px;height:44px;border-radius:50%;border:none;background:var(--clay);color:white;font-size:1.1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.2s;flex-shrink:0}
.chat-send:disabled{opacity:0.4}.chat-send:not(:disabled):active{transform:scale(0.92)}
.chat-suggestions{display:flex;flex-wrap:wrap;gap:6px;padding:8px 0}
.chat-suggest{padding:7px 14px;border-radius:20px;border:1px solid var(--linen);background:var(--snow);font-size:0.76rem;color:var(--stone);cursor:pointer;transition:all 0.2s;font-family:'Outfit',sans-serif}
.chat-suggest:active{border-color:var(--clay);color:var(--clay)}
.api-setup{display:flex;flex-direction:column;align-items:center;gap:18px;padding:36px 16px;text-align:center}
.api-setup h3{font-family:'Patrick Hand',cursive;font-size:1.3rem;color:var(--bark)}
.api-setup p{font-size:0.84rem;color:var(--stone);line-height:1.55;max-width:320px}
.api-input{width:100%;max-width:320px;padding:13px 16px;border-radius:var(--radius-sm);border:1.5px solid var(--linen);font-family:monospace;font-size:0.8rem;background:var(--snow);outline:none}
.api-input:focus{border-color:var(--clay)}
.api-note{font-size:0.73rem;color:var(--stone);max-width:300px;line-height:1.4}
.api-saved{display:flex;align-items:center;gap:8px;justify-content:center;flex-wrap:wrap}
.api-status{font-size:0.8rem;color:var(--sage);font-weight:600}
.api-change{font-size:0.76rem;color:var(--clay);cursor:pointer;text-decoration:underline;background:none;border:none;font-family:'Outfit',sans-serif}
.context-banner{background:rgba(196,113,59,0.15);border-radius:var(--radius-sm);padding:12px 16px;margin-bottom:14px;font-size:0.76rem;color:var(--stone);display:flex;align-items:center;gap:8px}
.context-banner strong{color:var(--bark)}
.section-divider{font-family:'Patrick Hand',cursive;font-size:1.05rem;font-weight:400;color:var(--stone);margin:18px 0 10px;padding-top:10px;border-top:1px solid var(--linen)}
/* Starter Tabs */
.starter-tabs{display:flex;gap:0;margin-bottom:20px;border-radius:var(--radius-sm);overflow:hidden;border:1.5px solid var(--linen)}
.starter-tab{flex:1;padding:12px;text-align:center;font-weight:600;font-size:0.85rem;cursor:pointer;background:var(--snow);color:var(--stone);transition:all 0.2s;border:none;font-family:'Outfit',sans-serif}
.starter-tab.active{background:var(--clay);color:white}
/* Creation Day Nav */
.creation-days{display:flex;gap:6px;margin-bottom:20px;overflow-x:auto;scrollbar-width:none;padding:4px 0;justify-content:center}
.creation-days::-webkit-scrollbar{display:none}
.creation-day-btn{min-width:42px;height:42px;border-radius:50%;border:2px solid var(--linen);display:flex;align-items:center;justify-content:center;font-size:0.8rem;font-weight:600;cursor:pointer;transition:all 0.2s;background:var(--snow);color:var(--stone);flex-shrink:0;font-family:'Outfit',sans-serif}
.creation-day-btn.current{border-color:var(--clay);color:var(--clay);background:rgba(196,113,59,0.15)}
.creation-day-btn.completed{background:var(--sage);border-color:var(--sage);color:white}
.creation-day-btn.has-data{border-color:var(--clay-light)}
/* Visual Picker */
.diag-section{margin-bottom:20px;width:100%;max-width:400px}
.diag-label{font-family:'Patrick Hand',cursive;font-weight:400;font-size:1.1rem;margin-bottom:10px;color:var(--bark);display:flex;align-items:center;gap:8px}
.diag-options{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.diag-options.three-col{grid-template-columns:1fr 1fr 1fr}
.diag-option{padding:14px 12px;border-radius:var(--radius-sm);border:1.5px solid var(--linen);background:var(--snow);cursor:pointer;transition:all 0.2s;text-align:center;position:relative}
.diag-option:active{transform:scale(0.97)}
.diag-option.selected{border-color:var(--clay);background:rgba(196,113,59,0.15)}
.diag-emoji{font-size:1.5rem;margin-bottom:4px}
.diag-name{font-weight:600;font-size:0.78rem;color:var(--bark)}
.diag-desc{font-size:0.68rem;color:var(--stone);margin-top:3px;line-height:1.3}
/* Corner status badge */
.diag-badge{position:absolute;top:-6px;right:-6px;width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;line-height:1;z-index:2;border:2px solid var(--snow)}
.diag-badge.good{background:var(--sage);color:white}
.diag-badge.bad{background:var(--danger);color:white}
/* Diagnostic Tips */
.diag-tip{background:rgba(196,113,59,0.15);border-left:3px solid var(--clay-light);padding:12px 14px;border-radius:0 var(--radius-sm) var(--radius-sm) 0;font-size:0.82rem;color:var(--stone);line-height:1.5;margin:8px 0;width:100%;max-width:400px}
.diag-tip.danger{background:rgba(194,91,74,0.18);border-left-color:var(--danger)}
.diag-tip strong{color:var(--bark)}
.diag-tip.good{background:rgba(196,113,59,0.1);border-left-color:var(--clay-light)}
/* Readiness Checklist */
.readiness-list{list-style:none;width:100%;max-width:400px}
.readiness-item{display:flex;align-items:center;gap:12px;padding:14px 0;border-bottom:1px solid rgba(92,61,46,0.3);cursor:pointer}
.readiness-check{width:24px;height:24px;border-radius:50%;border:2px solid var(--linen);display:flex;align-items:center;justify-content:center;font-size:0.7rem;transition:all 0.2s;flex-shrink:0}
.readiness-check.checked{background:var(--sage);border-color:var(--sage);color:white}
.readiness-info{flex:1}
.readiness-label{font-weight:600;font-size:0.88rem;color:var(--bark)}
.readiness-desc{font-size:0.76rem;color:var(--stone);margin-top:2px}
/* Day 1 Setup */
.setup-hero{text-align:center;margin-bottom:24px}
.setup-hero-emoji{font-size:3.5rem;margin-bottom:8px}
.setup-hero-title{font-family:'Patrick Hand',cursive;font-size:1.4rem;font-weight:400;color:var(--bark)}
.setup-hero-sub{font-size:0.82rem;color:var(--stone);margin-top:4px}
.setup-section{width:100%;max-width:400px;margin-bottom:20px}
.setup-section h3{font-family:'Literata',serif;font-size:0.95rem;font-weight:600;margin-bottom:12px;color:var(--bark);display:flex;align-items:center;gap:8px}
.setup-item{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid rgba(92,61,46,0.3);font-size:0.86rem;color:var(--bark)}
.setup-item-emoji{font-size:1.1rem;min-width:28px;text-align:center}
.setup-steps{width:100%;max-width:400px}
.setup-steps ol{list-style:none;counter-reset:setup-step}
.setup-steps li{counter-increment:setup-step;padding:10px 0 10px 40px;border-bottom:1px solid rgba(92,61,46,0.3);font-size:0.84rem;position:relative;line-height:1.6;color:var(--bark)}
.setup-steps li::before{content:counter(setup-step);position:absolute;left:0;top:10px;width:26px;height:26px;border-radius:50%;background:var(--clay-pale);color:var(--clay);font-size:0.72rem;font-weight:700;display:flex;align-items:center;justify-content:center;font-family:'Literata',serif}
/* Maintenance Calendar */
.maint-calendar{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;width:100%;max-width:360px;margin-bottom:16px}
.maint-cal-header{font-size:0.65rem;color:var(--stone);text-align:center;padding:4px 0;font-weight:600}
.maint-cal-day{aspect-ratio:1;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:0.72rem;font-weight:500;cursor:pointer;transition:all 0.2s;background:var(--snow);border:1px solid rgba(92,61,46,0.3)}
.maint-cal-day.fed{background:var(--sage);color:white;border-color:var(--sage)}
.maint-cal-day.today{border-color:var(--clay);font-weight:700}
.maint-cal-day.empty{background:transparent;border-color:transparent;cursor:default}
/* Congrats */
.congrats-screen{text-align:center;padding:32px 16px}
.congrats-emoji{font-size:3.5rem;margin-bottom:16px}
.congrats-title{font-family:'Patrick Hand',cursive;font-size:1.6rem;font-weight:400;color:var(--bark);margin-bottom:8px}
.congrats-text{font-size:0.88rem;color:var(--stone);line-height:1.6;max-width:320px;margin:0 auto 24px}
/* Day info banner */
.day-info-banner{background:rgba(196,113,59,0.12);border:1.5px solid var(--linen);border-radius:var(--radius-sm);padding:14px 16px;margin-bottom:18px;font-size:0.82rem;color:var(--stone);line-height:1.5;width:100%;max-width:400px}
.day-info-banner strong{color:var(--bark)}
.day-info-banner .expected{color:var(--clay-light);font-weight:600}
/* Star celebration animation */
@keyframes starPulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.5;transform:scale(0.8) rotate(15deg)}}
/* Bread buddy animations */
@keyframes breadIdle{0%,100%{transform:translateY(0)}50%{transform:translateY(-3px)}}
@keyframes breadHappy{0%,100%{transform:translateY(0) rotate(0deg)}25%{transform:translateY(-6px) rotate(-3deg)}50%{transform:translateY(0) rotate(0deg)}75%{transform:translateY(-6px) rotate(3deg)}}
@keyframes breadSick{0%,100%{transform:translateX(0) rotate(0deg)}25%{transform:translateX(-2px) rotate(-2deg)}75%{transform:translateX(2px) rotate(2deg)}}
@keyframes breadMad{0%,100%{transform:translateX(0)}20%{transform:translateX(-3px)}40%{transform:translateX(3px)}60%{transform:translateX(-2px)}80%{transform:translateX(2px)}}
@keyframes breadCelebrate{0%,100%{transform:translateY(0) rotate(0deg)}25%{transform:translateY(-8px) rotate(-5deg)}50%{transform:translateY(-2px) rotate(0deg)}75%{transform:translateY(-8px) rotate(5deg)}}
.bread-buddy{position:absolute;bottom:-14px;right:-20px;z-index:6;pointer-events:none}
/* Scrollbar */
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:var(--cloud)}
::-webkit-scrollbar-thumb{background:var(--linen);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--stone)}
/* Dark mode input overrides */
input,textarea,select{color-scheme:dark}
/* Selection color */
::selection{background:rgba(196,113,59,0.3);color:var(--bark)}
/* Doodle border effect — asymmetric border-radius from Stitch */
.doodle-border{border-radius:255px 15px 225px 15px/15px 225px 15px 255px;border:2px solid var(--linen)}
.card{border-radius:255px 15px 225px 15px/15px 225px 15px 255px !important}
.diag-option{border-radius:255px 15px 225px 15px/15px 225px 15px 255px !important}
.challenge-tab{border-radius:255px 15px 225px 15px/15px 225px 15px 255px !important}
.guide-card{border-radius:255px 15px 225px 15px/15px 225px 15px 255px !important;overflow:visible !important}
.shop-day-card{border-radius:255px 15px 225px 15px/15px 225px 15px 255px !important;overflow:visible !important}
.recipe-sheet{border-radius:255px 15px 0 0/15px 225px 0 0 !important}
.sketch-card{border:2px solid var(--clay);border-radius:2% 6% 5% 4%/1% 1% 2% 4%;box-shadow:3px 3px 0px rgba(196,113,59,0.2)}
/* Bumpy organic circles — for day buttons, checks */
.bumpy-circle{border-radius:48% 52% 56% 44%/45% 55% 45% 55% !important}
.creation-day-btn{border-radius:48% 52% 56% 44%/45% 55% 45% 55% !important}
.day-num{border-radius:48% 52% 56% 44%/45% 55% 45% 55% !important}
.day-check{border-radius:48% 52% 56% 44%/45% 55% 45% 55% !important}
.timeline-day{border-radius:48% 52% 56% 44%/45% 55% 45% 55% !important}
.maint-cal-day{border-radius:48% 52% 56% 44%/45% 55% 45% 55% !important}
.nav-btn.active::after{border-radius:50% 20%/10% 40%}
/* Pencil hatching texture */
.pencil-texture{background-image:repeating-linear-gradient(45deg,transparent,transparent 2px,rgba(196,113,59,0.1) 2px,rgba(196,113,59,0.1) 4px)}
/* Sketch line */
.sketch-line{height:3px;background:var(--linen);border-radius:50% 20%/10% 40%}
/* Material Symbols for doodle icons */
.material-symbols-outlined{font-family:'Material Symbols Outlined';font-weight:normal;font-style:normal;font-size:24px;line-height:1;letter-spacing:normal;text-transform:none;display:inline-block;white-space:nowrap;word-wrap:normal;direction:ltr;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;font-feature-settings:'liga'}
.diag-icon{font-size:32px;margin:0 auto 6px;color:var(--clay-light);display:flex;align-items:center;justify-content:center}
.diag-label .diag-icon{font-size:24px;margin:0;display:inline-flex}
</style>
</head>

<script>
// ═══ DATA: 14-DAY CHALLENGE ═══
const DAYS=[
{day:1,title:'Strudel de Manzana',subtitle:'Masa estirada a mano + crème fraîche',difficulty:2,starter:false,totalTime:'2h',
ingredients:['Masa: 250g Harina sin preparar, 1 Huevo, 2 cdas Aceite vegetal, 100ml Agua tibia, ½ cdta Sal, 1 cdta Vinagre blanco','Relleno: 4 Manzanas verdes (Granny Smith), 80g Azúcar, 50g Pasas (remojadas en ron o jugo de naranja), 50g Nueces picadas, 1 cdta Canela, Ralladura de 1 limón','Armado: 80g Mantequilla derretida, 50g Pan rallado, Azúcar impalpable','Crème fraîche: 200ml Crema de leche, 2 cdas Azúcar impalpable, 1 cdta Vainilla'],
steps:['MASA: Mezcla harina y sal. Agrega huevo, aceite y agua tibia. Amasa 10 min hasta elástica y lisa.','Forma bola, pinta con aceite, cubre con bowl tibio. Reposa 30 min mínimo (el gluten se relaja).','RELLENO: Pela y corta manzanas en láminas finas. Mezcla con azúcar, canela, ralladura, pasas y nueces.','Dora pan rallado en 2 cdas mantequilla hasta crujiente. Reserva.','ESTIRA LA MASA: Sobre un mantel enharinado, estira con rodillo primero. Luego con los puños por debajo, estira desde el centro hacia afuera.','Debe quedar tan fina que puedas leer a través de ella. Recorta bordes gruesos.','Pinta toda la superficie con mantequilla derretida. Espolvorea pan rallado dorado.','Distribuye relleno en una línea a lo largo de un borde. Enrolla usando el mantel como ayuda.','Pasa a bandeja con papel manteca, forma media luna. Pinta con mantequilla.','Hornea 190°C, 30-35 min hasta dorado y crujiente. Espolvorea azúcar impalpable.','CRÈME: Bate crema + azúcar + vainilla hasta firme. Sirve una cucharada generosa al lado. Attendez la crème.'],
tip:'El secreto del strudel es la paciencia al estirar. Usa los PUÑOS (no dedos) por debajo de la masa, estirando del centro hacia afuera. Si se rompe un poco, no pasa nada — al enrollar se sella. La crème fraîche fría contra el strudel caliente es el contraste perfecto.',timers:[{name:'Reposo masa',min:30},{name:'Horneado',min:33}],video:'https://www.youtube.com/watch?v=7H3z3J50XCs',videoLabel:'Binging with Babish: Strudel (Inglourious Basterds)'},
{day:2,title:'Brownie de Chocolate',subtitle:'Fudgy, intenso, irresistible',difficulty:1,starter:false,totalTime:'1h',
ingredients:['200g Chocolate bitter (Winters o Sol del Cusco)','150g Mantequilla sin sal','200g Azúcar','3 Huevos','80g Harina sin preparar','30g Cocoa en polvo','1 cdta Esencia de vainilla','Pizca de sal'],
steps:['Precalienta horno a 175°C. Engrasa molde cuadrado 20cm con mantequilla.','Derrite chocolate + mantequilla a baño maría o microondas (30s intervals). Mezcla bien.','Agrega azúcar y vainilla. Mezcla.','Agrega huevos uno a uno, batiendo bien cada vez.','Tamiza harina + cocoa + sal encima. Incorpora con espátula suavemente — NO batir de más.','Vierte en molde. Hornea 24-28 min. Prueba del movimiento: agita el molde — bordes firmes, centro con ligero temblor.','IMPORTANTE: Enfría completamente en molde antes de cortar. NO uses palillo — si sale limpio, ya te pasaste.'],
tip:'El test del palillo es tu ENEMIGO para brownies. Para fudgy, el palillo debe salir con migajas húmedas y un poco de masa. Si sale limpio, ya es cake. Mejor usa el test del temblor: agita el molde, los bordes no se mueven pero el centro tiembla como gelatina.',timers:[{name:'Horneado',min:26}],video:'https://www.youtube.com/results?search_query=joshua+weissman+fudgy+brownies',videoLabel:'Joshua Weissman: Fudgy Brownies'},
{day:3,title:'Masa Madre + Pan de Ajo',subtitle:'Hoy nace tu starter',difficulty:2,starter:true,totalTime:'30m + días',
ingredients:['Masa madre: 50g Harina sin preparar, 50g Agua filtrada tibia, 1 frasco de vidrio','Pan de ajo: Pan del día anterior, 4 dientes ajo, 50g Mantequilla, Perejil, Sal'],
steps:['MASA MADRE: Mezcla 50g harina + 50g agua tibia en frasco limpio.','Sin grumos, consistencia de pasta espesa.','Tapa sin cerrar del todo (necesita aire). Lugar tibio.','Marca el nivel con liga. Desde mañana: alimentar cada 24h.','PAN DE AJO: Derrite mantequilla, mezcla con ajo picado y perejil.','Corta pan en rebanadas sin llegar al fondo. Rellena.','Envuelve en aluminio. Hornea 180°C, 15 min.'],
tip:'Tu starter pasará fases: muchas burbujas (día 2-3), se calma (día 4-5), revive fuerte. No te desanimes — el "falso ascenso" del día 2-3 es bacterias Leuconostoc, NO levadura. La verdadera actividad viene día 5-7.',timers:[{name:'Horneado pan de ajo',min:15}],video:'https://www.youtube.com/results?search_query=joshua+weissman+sourdough+starter+guide',videoLabel:'Joshua Weissman: Guía de Masa Madre'},
{day:4,title:'Pie de Limón',subtitle:'Cremoso con merengue dorado',difficulty:3,starter:true,totalTime:'2h 30m',
ingredients:['Base: 200g Galletas de vainilla, 100g Mantequilla derretida','Relleno: 1 lata Leche condensada (Gloria 393g), 4 Yemas, 150ml Jugo de limón sutil (~12 limones), Ralladura de 2 limones','Merengue suizo: 4 Claras, 200g Azúcar, Pizca de sal'],
steps:['Alimenta tu masa madre: descarta mitad, agrega 50g harina + 50g agua.','BASE: Tritura galletas hasta polvo. Mezcla con mantequilla derretida.','Presiona en molde de pie (24cm) fondo y lados. Hornea 170°C, 10 min. Enfría.','RELLENO: Mezcla leche condensada + yemas + jugo + ralladura. Vierte sobre base fría.','Hornea 170°C, 15 min hasta que cuaje (tiembla como gelatina al mover).','MERENGUE SUIZO: Calienta claras + azúcar + sal a baño maría, revolviendo hasta que el azúcar se disuelva (toca — sin granos).','Retira del calor y bate con batidora 5-7 min hasta picos firmes, brillantes y fríos. Cubre el relleno CALIENTE formando picos.','Hornea 180°C, 8-10 min hasta dorar las puntas. Refrigera 2h antes de servir.'],
tip:'CLAVE: El merengue va sobre el relleno CALIENTE (directo del horno). Si pones merengue sobre relleno frío, llora y se separa. Cubre hasta los bordes sin dejar huecos. El limón sutil peruano es clave — es más ácido que el limón normal.',video:'https://www.youtube.com/results?search_query=sandra+plevisani+pie+de+limon',videoLabel:'Sandra Plevisani: Pie de Limón',timers:[{name:'Base',min:10},{name:'Relleno',min:15},{name:'Merengue',min:10},{name:'Refrigeración',min:120}]},
{day:5,title:'Pastel de Nata',subtitle:'Custard tart portuguesa — Poor Things',difficulty:3,starter:true,totalTime:'1h 30m',
ingredients:['Masa: 1 lámina hojaldre comprada (o 250g harina, 150g mantequilla fría, agua, sal)','Crema: 400ml Leche entera, 150g Azúcar, 30g Maicena, 6 Yemas, 1 rama Canela, Cáscara de 1 limón'],
steps:['Alimenta masa madre.','CREMA: Hierve leche + canela + cáscara de limón 5 min. Retira canela y cáscara.','Aparte: bate yemas + azúcar + maicena hasta liso. Vierte leche caliente encima poco a poco.','Regresa a fuego medio, revuelve sin parar 2-3 min hasta espesar. Cubre con plástico tocando. Enfría.','MASA: Estira hojaldre fino (3mm). Enrolla bien apretado como un cilindro.','Corta rodajas de 1.5cm. Coloca cada rodaja en molde de muffin engrasado.','Con el pulgar mojado en agua, presiona el centro y sube la masa por las paredes.','Rellena ¾ con crema fría. NO hasta el tope — sube al hornear.','Hornea 250°C (máximo de tu horno) 12-15 min. Las manchas negras en la crema son BUENAS.','Enfría 5 min en molde, desmolda. Espolvorea canela. Come tibio.'],
tip:'El secreto es el horno MUY caliente — las manchas quemadas en la crema son la firma del pastel de nata auténtico. Y la masa: enrolla el hojaldre en un cilindro apretado, corta en rodajas, y presiona con el pulgar en el molde. Así salen las capas espirales.',timers:[{name:'Crema',min:8},{name:'Horneado',min:14}],video:'https://www.youtube.com/watch?v=lWLCxui1Mw8',videoLabel:'Cupcake Jemma: Pastéis de Nata'},
{day:6,title:'Tarta de Nueces y Miel',subtitle:'Crujiente, dulce, con nueces caramelizadas',difficulty:3,starter:true,totalTime:'2h',
ingredients:['Masa: 200g Harina, 100g Mantequilla fría en cubos, 55g Azúcar impalpable, 1 Yema, 2 cdas Agua fría, Pizca de sal','Relleno: 200g Nueces pecanas o de castilla, 100g Miel, 80g Azúcar rubia, 60g Mantequilla, 80ml Crema de leche (Gloria), 1 cdta Vainilla, Pizca de sal gruesa'],
steps:['Alimenta masa madre.','MASA: Mezcla harina + azúcar impalpable. Agrega mantequilla fría — corta con dedos hasta arena gruesa.','Agrega yema y agua. Forma disco, envuelve en plástico, refri 30 min.','Estira masa y forra molde de tarta (24cm). Pincha con tenedor. Hornea 180°C, 12 min.','RELLENO: Calienta miel + azúcar + mantequilla hasta que hierva. Cocina 2 min.','Retira del fuego, agrega crema, vainilla, sal. Mezcla. Agrega nueces.','Vierte sobre base. Hornea 175°C, 20-25 min hasta dorado burbujeante.','Enfría completamente — el relleno se pone firme y carameloso.'],
tip:'La masa de tarta es lo contrario al pan: NO amasarla mucho. Solo unir. Tuesta las nueces 8 min a 170°C antes — cambia todo el sabor. El caramelo debe llegar a ámbar profundo (118°C si tienes termómetro) antes de agregar la crema.',timers:[{name:'Reposo masa',min:30},{name:'Base',min:12},{name:'Relleno',min:25}],video:'https://www.youtube.com/results?search_query=bigger+bolder+baking+walnut+caramel+tart',videoLabel:'Bigger Bolder Baking: French Walnut Tart'},
{day:7,title:'Cinnamon Rolls',subtitle:'Suaves, pegajosos, con glaseado',difficulty:2,starter:true,totalTime:'3h',
ingredients:['Masa: 500g Harina sin preparar, 240ml Leche tibia, 75g Mantequilla blanda, 75g Azúcar, 7g Levadura seca, 1 Huevo, 6g Sal','Relleno: 100g Mantequilla blanda, 150g Azúcar rubia (o blanca + 1 cda melaza), 2 cdas Canela molida','Glaseado: 120g Queso crema, 60g Mantequilla blanda, 150g Azúcar impalpable, 1 cdta Vainilla'],
steps:['Alimenta masa madre.','MASA: Disuelve levadura en leche tibia con 1 cda azúcar. Espera 5 min hasta espumoso.','Mezcla harina, sal, azúcar. Agrega leche, huevo, mantequilla blanda. Amasa 10 min hasta suave y elástica.','Fermenta 1.5h en bowl aceitado tapado hasta duplicar.','RELLENO: Mezcla mantequilla blanda + azúcar rubia + canela hasta pasta untable.','Estira masa en rectángulo de 40x30cm sobre mesa enharinada.','Unta TODO el relleno dejando 1cm libre en el borde lejano.','Enrolla desde el lado largo hacia ti, bien apretado. Sella el borde con los dedos.','Corta 12 rodajas iguales con hilo dental (pasa por debajo, cruza arriba, jala).','Coloca en molde engrasado (redondo o rectangular) con 1cm de separación.','Cubre con plástico. Reposo 30 min hasta que se toquen entre sí.','Hornea 180°C, 22-25 min hasta dorados arriba pero suaves al tocar.','GLASEADO: Bate queso crema + mantequilla + azúcar impalpable + vainilla hasta cremoso.','Vierte glaseado sobre los rolls CALIENTES. Deja que se derrita y cubra todo.'],
tip:'El truco del hilo dental para cortar es real — un cuchillo aplasta el rollo pero el hilo corta limpio. El glaseado VA sobre los rolls calientes, así se derrite y penetra. No pongas harina extra al estirar — la masa pegajosa = rolls suaves.',timers:[{name:'Fermentación',min:90},{name:'Reposo',min:30},{name:'Horneado',min:23}],video:'https://www.youtube.com/results?search_query=preppy+kitchen+cinnamon+rolls',videoLabel:'Preppy Kitchen: Cinnamon Rolls'},
{day:8,title:'Mil Hojas + Sorbete de Pera',subtitle:'Hojaldre crujiente con sorbete casero',difficulty:4,starter:true,totalTime:'4h + congelado',
ingredients:['Hojaldre: 1 lámina hojaldre comprada (o 250g harina, 200g mantequilla, agua, sal para casera)','Crema pastelera: 500ml Leche, 4 Yemas, 100g Azúcar, 40g Maicena, 1 cdta Vainilla','Sorbete: 4 Peras maduras, 150g Azúcar, 200ml Agua, Jugo de 1 limón','Azúcar impalpable para espolvorear'],
steps:['Alimenta masa madre.','SORBETE (hacer primero): Pela y corta peras. Hierve azúcar + agua 3 min (almíbar).','Agrega peras al almíbar, cocina 10 min hasta tiernas. Agrega limón.','Licúa todo hasta liso. Vierte en recipiente plano, congela 4h. Cada hora revuelve con tenedor.','CREMA: Calienta leche. Bate yemas + azúcar + maicena aparte. Vierte leche caliente encima.','Regresa a fuego medio, revuelve sin parar hasta espesar (~3 min). Agrega vainilla. Enfría con plástico tocando superficie.','HOJALDRE: Estira, corta 3 rectángulos iguales. Pincha todo con tenedor. Espolvorea azúcar.','Hornea 200°C, 15-18 min hasta dorado y hojaldrado. Enfría completamente.','ARMA: Capa de hojaldre → crema → hojaldre → crema → hojaldre. Espolvorea azúcar impalpable.','Sirve con bola de sorbete de pera al lado. Corta con cuchillo serrado.'],
tip:'TRUCO PRO: Pon una segunda bandeja ENCIMA del hojaldre los primeros 15 min — lo mantiene plano y crujiente. Sin peso, sube demasiado y no puedes apilar. El sorbete: revuelve con tenedor cada hora mientras congela para textura de granita.',timers:[{name:'Sorbete cocción',min:13},{name:'Crema pastelera',min:5},{name:'Horneado hojaldre',min:17},{name:'Congelado sorbete',min:240}],video:'https://www.youtube.com/watch?v=5QZN68CNdSg',videoLabel:'Bruno Albouze: Mille-Feuille'},
{day:9,title:'Focaccia con Romero',subtitle:'Pan plano italiano con aceite de oliva',difficulty:2,starter:true,totalTime:'3h',
ingredients:['500g Harina sin preparar','385ml Agua tibia (hidratación alta)','7g Levadura seca','10g Sal','6 cdas Aceite de oliva extra virgen','Sal gruesa / Sal de Maras','Romero fresco','Tomates cherry','Aceitunas negras'],
steps:['Alimenta masa madre.','Mezcla harina, levadura, sal, agua. 3 cdas aceite.','Amasa 8 min o stretch & fold.','2 cdas aceite en bandeja. Coloca masa, voltea para cubrir.','Fermenta 1.5h en bandeja tapada.','Dedos aceitados: haz hoyitos por toda la superficie.','Agrega romero, tomates, aceitunas. Rocía aceite. Sal gruesa.','Hornea 220°C, 20-25 min hasta dorada.'],
tip:'Los hoyitos deben ser AGRESIVOS — dedos aceitados hasta el fondo de la bandeja. Hoyitos tímidos = focaccia plana y densa. La masa es pegajosa y está BIEN — alta hidratación = alvéolos grandes y crujiente.',timers:[{name:'Amasado',min:8},{name:'Fermentación',min:90},{name:'Horneado',min:22}],video:'https://www.youtube.com/watch?v=HTD-z1wd0tw',videoLabel:'Ethan Chlebowski: Focaccia'},
{day:10,title:'Volcán de Chocolate',subtitle:'Lava fundida por dentro',difficulty:3,starter:true,totalTime:'1h',
ingredients:['150g Chocolate bitter (70%+)','120g Mantequilla sin sal','3 Huevos enteros','130g Azúcar','50g Harina sin preparar','Cocoa en polvo para moldes','Helado de vainilla para servir'],
steps:['Alimenta masa madre. ¿Duplica en 4-6h? Casi lista para sourdough.','Precalienta horno a 210°C. Engrasa 6 ramequines con mantequilla generosa, luego espolvorea COCOA (no harina — deja residuo blanco).','Derrite chocolate + mantequilla a baño maría. Mezcla hasta liso.','Bate huevos + azúcar 3 min hasta espumoso y pálido.','Vierte chocolate tibio sobre huevos. Mezcla suavemente.','Tamiza harina encima, incorpora con espátula. Divide en moldes.','Hornea EXACTAMENTE 12 min a 210°C. Bordes firmes, centro tembloroso (2-3cm).','Espera 30 seg, voltea sobre plato. Levanta molde. Sirve con helado INMEDIATAMENTE.'],
tip:'El timing es TODO. 210°C (no 220) por 12 min exactos. La masa debe estar a temperatura ambiente al entrar — fría del refri necesita 2 min extra. Prueba con un molde primero para calibrar TU horno.',timers:[{name:'Horneado',min:12}],video:'https://www.youtube.com/watch?v=6laBhpKfLqo',videoLabel:'Del\'s Cooking Twist: Volcán de Chocolate'},
{day:11,title:'Primer Sourdough',subtitle:'El gran día — tu primer pan de masa madre',difficulty:4,starter:true,totalTime:'8-24h',
ingredients:['100g Masa madre activa','400g Harina sin preparar','100g Harina integral','340ml Agua tibia','10g Sal','(Respaldo: 2g levadura seca)'],
steps:['Alimenta starter por la mañana. Espera 4-6h hasta activa.','Prueba del flotador: cucharadita en agua. Flota = lista.','Mezcla harinas + agua. Reposa 30 min (autólisis). Agrega starter y sal.','4 rondas de stretch & fold cada 30 min. Usa recipiente recto con liga marcando el nivel inicial.','Fermenta hasta +50-75% de volumen (3-5h en Perú, más rápido por el clima cálido). O toda la noche en refri.','Forma bollo tenso: pliega bordes al centro, voltea, crea tensión en superficie.','Bowl enharinado (banneton improvisado). Refrigera 12-16h.','Precalienta olla/pyrex a 250°C por 45 min. Hornea 20 min tapado, baja a 230°C, 20-25 min destapado.'],
tip:'Si starter no flota, agrega 2g levadura seca. En el clima peruano la fermentación va más rápido — vigila el volumen, no el reloj. Marca el nivel inicial y espera +50-75%.',timers:[{name:'Autólisis',min:30},{name:'Stretch & Fold',min:30},{name:'Fermentación',min:240},{name:'Horneado tapado',min:20},{name:'Horneado destapado',min:22}],video:'https://www.youtube.com/watch?v=NMglhwp2lNs',videoLabel:'The Bread Code: Receta Definitiva de Sourdough'},
{day:12,title:'Turrones de Doña Pepa',subtitle:'El dulce del Señor de los Milagros',difficulty:4,starter:false,totalTime:'3h',
ingredients:['Masa: 500g Harina, 225g Manteca vegetal o de cerdo, 8 Yemas, 2 cdas Anís en grano (tostar primero), 1 cdta Clavo molido, 1 cdta Sal, Ajonjolí tostado','Miel: 500g Chancaca, 500g Azúcar, 1 Membrillo en trozos, Rodajas de piña, 1 Manzana, Canela en rama, Clavo entero, Cáscara de naranja, 3 tazas Agua','Decoración: Grajeas de colores (confites)'],
steps:['TUESTA anís y ajonjolí en sartén seca 2 min hasta que suelten aroma. Hierve anís en 4 cdas agua, cuela.','MASA: Mezcla harina, clavo, sal. Agrega manteca, yemas y agua de anís tostado.','Amasa 8 min. Masa firme. Envuelve en plástico, REFRIGERA mínimo 2h (ideal 12h — evita que se quiebren).','Saca de refri. Forma cilindros de 1cm grosor, 15cm largo. Pasa por ajonjolí tostado.','Hornea palitos a 180°C, 20-25 min hasta firmes (no dorados).','MIEL: Hierve chancaca + azúcar + frutas + especias + agua. Cocina 30-40 min revolviendo hasta miel espesa (punto bolita suave).','ARMA: Capas de palitos alternando dirección en molde. Baña cada capa con miel caliente.','Decora con grajeas de colores. Deja enfriar COMPLETAMENTE antes de cortar.'],
tip:'CLAVE: Tuesta el anís y ajonjolí antes — activa los aceites y cambia todo el sabor. Y la masa DEBE reposar en frío, si no los palitos se quiebran al hornear. La miel debe llegar a punto bolita suave.',timers:[{name:'Horneado palitos',min:22},{name:'Miel de chancaca',min:35}],video:'https://www.youtube.com/watch?v=UKBVyJxl6W0',videoLabel:'Buenazo: Turrón de Doña Pepa'},
{day:13,title:'Sourdough + Scoring',subtitle:'Cortes decorativos en tu pan',difficulty:4,starter:true,totalTime:'24h',
ingredients:['120g Masa madre activa','500g Harina sin preparar','350ml Agua tibia','10g Sal','Hoja de afeitar o cuchillo afilado','Harina de arroz (opcional)'],
steps:['Prepara masa como Día 11. Forma y refrigera toda la noche.','Antes de hornear: espolvorea harina.','Con hoja de afeitar practica:','Básico: corte largo curvo (sonrisa) — el clásico.','Cruz: dos cortes perpendiculares en X.','Hojas: cortes curvos desde centro, como pétalos.','Corte rápido, decisivo, ángulo 30-45°.','Hornea inmediatamente: 240°C, 25 tapado + 20 destapado.'],
tip:'La hoja NUEVA y afilada + masa FRÍA de la refri = cortes limpios. Para la "oreja" clásica: cuchilla a 30° (casi horizontal). Para diseños decorativos (hojas, trigo): 45-90° y más superficial (3-5mm). Un solo movimiento rápido y decidido — si dudas, se pega.',timers:[{name:'Horneado tapado',min:25},{name:'Horneado destapado',min:20}],video:'https://www.youtube.com/results?search_query=foodgeek+sourdough+scoring+techniques',videoLabel:'Foodgeek: Técnicas de Scoring'},
{day:14,title:'Courtesan au Chocolat',subtitle:'La obra maestra de Mendl\'s — Grand Budapest Hotel',difficulty:5,starter:false,totalTime:'4h',
ingredients:['Choux: 125ml Agua, 125ml Leche, 100g Mantequilla, 150g Harina, 4-5 Huevos, 1 cdta Azúcar, Pizca de sal','Ganache: 200g Chocolate bitter, 200ml Crema de leche caliente','Crema de relleno: 300ml Crema de leche, 3 cdas Azúcar impalpable, 1 cdta Vainilla, Colorante rosa (opcional)','Glaseado: 200g Chocolate blanco, Colorante rosa, 100g Azúcar impalpable, 2 cdas Leche','Decoración: Chocolate derretido para líneas, Frambuesas o fresas'],
steps:['CHOUX: Hierve agua + leche + mantequilla + azúcar + sal. Retira del fuego, agrega TODA la harina de golpe.','Mezcla fuerte con cuchara de madera hasta que se despegue de las paredes (1-2 min a fuego bajo).','Pasa a bowl. Agrega huevos UNO A UNO, mezclando bien cada vez. La masa cae en V de la cuchara.','Manga pastelera: forma 3 tamaños de bolitas en bandeja (grande, mediana, pequeña). Hornea 200°C, 25 min. NO abrir el horno.','Baja a 180°C, 10-15 min más hasta dorado profundo (no dorado pálido). Apaga horno, deja adentro con puerta entreabierta 5 min. Enfría boca abajo.','GANACHE: Vierte crema caliente sobre chocolate picado. Espera 1 min, mezcla desde el centro hasta liso.','CREMA: Bate crema + azúcar + vainilla + colorante rosa hasta firme. Rellena los choux por la base.','GLASEADO: Derrite chocolate blanco, agrega colorante rosa + azúcar impalpable + leche hasta liso y vertible.','Baña el choux grande en glaseado. Deja secar. Repite con mediano y pequeño.','ARMA LA TORRE: Grande abajo (ganache entre capas), mediano encima, pequeño en la punta.','Decora: líneas de chocolate oscuro en zigzag, una frambuesa en la punta.','Presenta en cajita o plato elegante. Mendl\'s estaría orgulloso.'],
tip:'FELICITACIONES — completaste el reto de 14 días. Choux sub-horneado COLAPSA al enfriar — debe estar dorado profundo, ligero y hueco al golpear. Deja secar en horno apagado con puerta abierta. Y los huevos: UNO A UNO, mezclando completamente antes del siguiente.',timers:[{name:'Choux horneado',min:25},{name:'Choux secado',min:12},{name:'Ganache',min:5}],video:'https://www.youtube.com/watch?v=GO5P3fLTwA0',videoLabel:'Binging with Babish: Courtesan au Chocolat (Grand Budapest Hotel)'}
];

const STARTER_GUIDE=[
{title:'<span class="material-symbols-outlined" style="font-size:18px;vertical-align:middle">straighten</span> Proporciones de Alimentación',body:`<div class="guide-measure"><span class="gm-qty">50g</span> Masa madre vieja (descartar el resto)</div><div class="guide-measure"><span class="gm-qty">50g</span> Harina sin preparar</div><div class="guide-measure"><span class="gm-qty">50g</span> Agua filtrada tibia (25-28°C)</div><p><strong>Proporción 1:1:1</strong> — siempre partes iguales de starter, harina y agua.</p><p><strong>Para hornear:</strong> La noche anterior, alimenta con más: 25g starter + 100g harina + 100g agua. Tendrás ~200g de starter activa por la mañana.</p>`},
{title:'<span class="material-symbols-outlined" style="font-size:18px;vertical-align:middle">water_drop</span> Agua — Lo que debes saber',body:`<p><strong>Temperatura:</strong> 25-28°C (tibia, no caliente). Usa termómetro o toca con el dedo — debe sentirse apenas tibia.</p><p><strong>Tipo:</strong> Agua filtrada o hervida y enfriada. El cloro del grifo puede matar las bacterias buenas de tu starter.</p><p><strong>Truco peruano:</strong> Hierve agua del grifo, déjala enfriar a temperatura ambiente. Funciona perfecto.</p>`},
{title:'<span class="material-symbols-outlined" style="font-size:18px;vertical-align:middle">edit_calendar</span> Rutina Diaria',body:`<p><strong>Si horneas seguido (diario/cada 2 días):</strong></p><p>Alimenta 2 veces al día: mañana y noche, a temperatura ambiente.</p><p><strong>Si horneas 1-2 veces por semana:</strong></p><p>Guarda en la refrigeradora. Alimenta 1 vez por semana. Saca la noche anterior a hornear, alimenta, deja a temp. ambiente toda la noche.</p><p><strong>Antes de hornear:</strong> Alimenta 4-6h antes. Debe duplicar su tamaño y pasar la prueba del flotador.</p>`},
{title:'<span class="material-symbols-outlined" style="font-size:18px;vertical-align:middle">search</span> Señales de Salud',body:`<p>✅ <strong>Starter sana:</strong> Olor agradable a yogurt/frutas fermentadas, muchas burbujas, duplica en 4-8h, flota en agua.</p><p>⚠️ <strong>Starter lenta:</strong> Pocas burbujas, no sube mucho. Solución: aliméntala 2-3 veces en un día, lugar más tibio.</p><p>🚫 <strong>Moho (verde/negro/rosa):</strong> Descarta y empieza de nuevo. El líquido gris/oscuro encima es normal — es "hooch" (alcohol). Mezcla o descarta ese líquido y alimenta.</p><p>👃 <strong>Olores normales:</strong> Frutal, yogurt, levemente ácido. <strong>No normal:</strong> Podrido, a queso fuerte, a pintura.</p>`},

// ═══ STATE ═══
const STATE_KEY='pan-de-casa-v2';
const defaultState={
  completedDays:{},starterFeedings:[],checkedItems:{},
  currentTab:'plan',activeChallenge:'pan-de-casa',activeShopTab:'basicos1',
  apiKey:'',chatHistory:[],
  feedingTimes:['08:00','20:00'],remindersOn:false,lastFeedNotif:'',
  starter:{mode:'creation',creationDay:1,creationStartDate:null,dailyCheckins:{},readinessChecks:[],creationCompleted:false}
};
let state=loadState();
let timerState={running:false,paused:false,name:'',totalSec:0,remainSec:0,interval:null};

function loadState(){
  try{
    const s=localStorage.getItem(STATE_KEY);
    let parsed=s?{...defaultState,...JSON.parse(s)}:{...defaultState};
    if(!parsed.starter){
      parsed.starter={...defaultState.starter};
      if(parsed.starterFeedings&&parsed.starterFeedings.length>0){
        const earliest=Math.min(...parsed.starterFeedings.map(f=>f.timestamp));
        parsed.starter.creationStartDate=new Date(earliest).toISOString().split('T')[0];
        const uniqueDays=new Set(parsed.starterFeedings.map(f=>f.day));
        parsed.starter.creationDay=Math.min(7,uniqueDays.size+1);
      }
    }
    return parsed;
  }catch(e){return{...defaultState}}
}
function saveState(){localStorage.setItem(STATE_KEY,JSON.stringify(state))}
function getChallenge(){return CHALLENGES.find(c=>c.id===state.activeChallenge)||CHALLENGES[0]}
function getCompleted(){return state.completedDays[state.activeChallenge]||[]}
function setCompleted(arr){state.completedDays[state.activeChallenge]=arr;saveState()}
function getNextDay(){const done=getCompleted();for(let i=1;i<=14;i++)if(!done.includes(i))return i;return 14}

// ═══ HEADER ═══
function updateHeader(){
  const done=getCompleted().length;const ch=getChallenge();
  document.getElementById('headerDay').textContent=`Día ${getNextDay()} / 14`;
  document.getElementById('journeyFill').style.width=((done/14)*100)+'%';
  document.querySelector('.header-title').textContent=ch.name;
}

// ═══ PLAN PAGE ═══
function renderChallengeTabs(){
  const el=document.getElementById('challengeTabs');
  const done=(state.completedDays['pan-de-casa']||[]).length;
  el.innerHTML=`<div style="text-align:center;margin-bottom:4px">
    <div style="font-family:'Patrick Hand',cursive;font-size:1rem;color:var(--stone)">${done}/14 completados</div>
  </div>`;
}

function renderPlan(){
  const ch=getChallenge();const done=getCompleted();
  const container=document.getElementById('dayCards');
  container.innerHTML=ch.days.map(d=>{
    const isDone=done.includes(d.day);
    const dots=Array.from({length:5},(_,i)=>`<span class="day-dot${i<d.difficulty?' filled':''}"></span>`).join('');
    return `<div class="card day-card${isDone?' completed':''}" data-day="${d.day}">
      <div class="day-num">${d.day}</div><div class="day-info">
        <div class="day-title">${d.title}</div>
        <div class="day-subtitle">${d.subtitle}</div>
        <div class="day-meta"><div class="day-dots">${dots}</div><span>${d.totalTime}</span>
        ${d.starter?'<span class="starter-badge">Alimentar</span>':''}</div>
      </div><div class="day-check${isDone?' done':''}" data-check="${d.day}">${isDone?'✓':''}</div></div>`;
  }).join('');
  container.querySelectorAll('.day-check').forEach(ch=>{
    ch.addEventListener('click',e=>{
      e.stopPropagation();const day=parseInt(ch.dataset.check);let arr=getCompleted();
      if(arr.includes(day))arr=arr.filter(d=>d!==day);else arr.push(day);
      setCompleted(arr);renderPlan();updateHeader();
    });
  });
  container.querySelectorAll('.day-card').forEach(card=>{
    card.addEventListener('click',()=>openRecipeSheet(parseInt(card.dataset.day)));
  });
}

    <div class="sheet-subtitle">${d.subtitle}</div>

    <div class="sheet-section"><div class="sheet-tip">${d.tip}</div></div>
    ${d.video?`<div class="sheet-section"><a href="${d.video}" target="_blank" rel="noopener" style="display:flex;align-items:center;gap:10px;padding:14px 16px;background:rgba(196,113,59,0.1);border:1.5px solid var(--linen);border-radius:255px 15px 225px 15px/15px 225px 15px 255px;color:var(--bark);text-decoration:none;font-size:0.85rem;transition:border-color 0.2s"><span class="material-symbols-outlined" style="font-size:28px;color:var(--clay)">play_circle</span><span><strong style="color:var(--clay)">${d.videoLabel||'Ver tutorial'}</strong><br><span style="font-size:0.75rem;color:var(--stone)">YouTube — paso a paso en video</span></span></a></div>`:''}

function getStarterActivity(){
  const f=state.starterFeedings.length;
  if(f===0)return{level:0,label:'Sin iniciar',icon:'bedtime',desc:'Inicia tu masa madre'};
  if(f<4)return{level:1,label:'Recién nacida',icon:'eco',desc:'Sigue alimentando 2x/día'};
  if(f<10)return{level:2,label:'Despertando',icon:'bubble_chart',desc:'Mostrando señales de vida'};
  if(f<18)return{level:3,label:'Activa',icon:'fitness_center',desc:'¡Casi lista para pan!'};
  return{level:4,label:'¡Muy activa!',icon:'local_fire_department',desc:'¡Lista para sourdough!'};
}

function renderJarSVG(checkinOrLevel,opts){
  const o=opts||{};
  let checkin=(typeof checkinOrLevel==='object'&&checkinOrLevel)?checkinOrLevel:{};
  if(typeof checkinOrLevel==='number'){checkin={_level:checkinOrLevel}}

  // Rise → fill height
  const riseMap={none:20,slight:32,good:50,doubled:65,tripled:82};
  let dH=checkin.rise?riseMap[checkin.rise]||25:25;
  if(checkin._level!==undefined)dH=Math.min(80,20+checkin._level*14);

  // Bubbles → SVG dots
  const bubMap={none:0,few_small:4,many_small:10,large_active:16};
  const bCount=checkin.bubbles?bubMap[checkin.bubbles]||0:(checkin._level||0)*3;
  let bubSvg='';
  for(let i=0;i<bCount;i++){
    const x=15+Math.random()*70;const y=10+Math.random()*75;
    const r=checkin.bubbles==='large_active'?(2+Math.random()*6):(1.5+Math.random()*3.5);
    const op=0.12+Math.random()*0.22;
    bubSvg+=`<circle cx="${x}%" cy="${y}%" r="${r}" fill="var(--clay)" opacity="${op}"/>`;
  }

  // Surface → top of dough
  let surfaceHtml='';
  if(checkin.surface==='bubbly'){
    surfaceHtml='<div style="position:absolute;top:-4px;left:10%;right:10%;height:8px;border-radius:50%;background:rgba(196,113,59,0.12)"></div><div style="position:absolute;top:-6px;left:25%;width:12px;height:12px;border-radius:50%;background:rgba(196,113,59,0.1)"></div><div style="position:absolute;top:-3px;right:20%;width:8px;height:8px;border-radius:50%;background:rgba(196,113,59,0.1)"></div>';
  } else if(checkin.surface==='hooch'){
    surfaceHtml='<div style="position:absolute;top:-2px;left:5%;right:5%;height:6px;background:rgba(92,61,46,0.35);border-radius:3px"></div>';
  } else if(checkin.surface==='mold_spots'){
    surfaceHtml='<div style="position:absolute;top:-4px;left:20%;width:10px;height:10px;border-radius:50%;background:rgba(125,184,103,0.5)"></div><div style="position:absolute;top:-2px;right:25%;width:7px;height:7px;border-radius:50%;background:rgba(125,184,103,0.4)"></div><div style="position:absolute;top:-5px;left:50%;width:8px;height:8px;border-radius:50%;background:rgba(125,184,103,0.45)"></div>';
  }

  // Consistency → fill opacity + texture
  const consMap={thick_paste:0.28,pancake_batter:0.15,stretchy:0.18,runny:0.08,dry_stiff:0.32};
  const fillOp=checkin.consistency?consMap[checkin.consistency]||0.15:0.15;
  // Stretchy → vertical stretch lines inside
  let stretchHtml='';
  if(checkin.consistency==='stretchy'){
    stretchHtml='<div style="position:absolute;left:30%;top:10%;bottom:10%;width:1px;background:var(--clay-light);opacity:0.3"></div><div style="position:absolute;left:50%;top:5%;bottom:15%;width:1px;background:var(--clay-light);opacity:0.25"></div><div style="position:absolute;left:70%;top:12%;bottom:8%;width:1px;background:var(--clay-light);opacity:0.3"></div>';
  }
  // Dry/stiff → crack lines
  let crackHtml='';
  if(checkin.consistency==='dry_stiff'){
    crackHtml='<svg style="position:absolute;inset:0;width:100%;height:100%;overflow:visible" xmlns="http://www.w3.org/2000/svg"><line x1="20%" y1="30%" x2="35%" y2="50%" stroke="var(--linen)" stroke-width="1" opacity="0.5"/><line x1="60%" y1="20%" x2="75%" y2="45%" stroke="var(--linen)" stroke-width="1" opacity="0.4"/><line x1="45%" y1="55%" x2="55%" y2="75%" stroke="var(--linen)" stroke-width="0.8" opacity="0.35"/></svg>';
  }
  // Runny → wavy horizontal lines
  let runnyHtml='';
  if(checkin.consistency==='runny'){
    runnyHtml='<svg style="position:absolute;inset:0;width:100%;height:100%;overflow:visible" xmlns="http://www.w3.org/2000/svg"><path d="M10%,35% Q30%,30% 50%,35% T90%,35%" fill="none" stroke="var(--clay-light)" stroke-width="0.8" opacity="0.3"/><path d="M10%,55% Q30%,50% 50%,55% T90%,55%" fill="none" stroke="var(--clay-light)" stroke-width="0.8" opacity="0.25"/><path d="M10%,75% Q30%,70% 50%,75% T90%,75%" fill="none" stroke="var(--clay-light)" stroke-width="0.8" opacity="0.2"/></svg>';
  }

  // Smell → tint shift + vapor lines
  let fillColor=`rgba(196,113,59,${fillOp})`;
  let vaporHtml='';
  if(checkin.smell==='yogurt_fruity'){
    fillColor=`rgba(196,130,70,${fillOp})`;
    vaporHtml='<div style="position:absolute;top:-20px;left:35%;font-size:10px;color:var(--clay-light);opacity:0.4;animation:rise 3s ease infinite">~</div><div style="position:absolute;top:-24px;left:55%;font-size:10px;color:var(--clay-light);opacity:0.3;animation:rise 3s ease 0.5s infinite">~</div>';
  } else if(checkin.smell==='vinegary'){
    fillColor=`rgba(190,140,60,${fillOp})`;
    vaporHtml='<div style="position:absolute;top:-22px;left:30%;font-size:12px;color:var(--clay);opacity:0.4;animation:rise 2.5s ease infinite">~</div><div style="position:absolute;top:-18px;left:55%;font-size:14px;color:var(--clay);opacity:0.35;animation:rise 2.5s ease 0.4s infinite">~</div><div style="position:absolute;top:-26px;left:45%;font-size:10px;color:var(--clay);opacity:0.3;animation:rise 2.5s ease 0.8s infinite">~</div>';
  } else if(checkin.smell==='acetone'){
    fillColor=`rgba(180,130,80,${fillOp})`;
    vaporHtml='<div style="position:absolute;top:-24px;left:25%;font-size:14px;color:var(--danger);opacity:0.35;animation:rise 2s ease infinite">~</div><div style="position:absolute;top:-20px;left:50%;font-size:16px;color:var(--danger);opacity:0.3;animation:rise 2s ease 0.3s infinite">~</div><div style="position:absolute;top:-28px;left:65%;font-size:12px;color:var(--danger);opacity:0.25;animation:rise 2s ease 0.7s infinite">~</div>';
  } else if(checkin.smell==='rotten'){
    fillColor=`rgba(140,100,60,${fillOp+0.05})`;
    vaporHtml='<div style="position:absolute;top:-22px;left:30%;font-size:14px;color:var(--danger);opacity:0.45;animation:rise 2s ease infinite">~</div><div style="position:absolute;top:-28px;left:50%;font-size:16px;color:var(--danger);opacity:0.35;animation:rise 2s ease 0.3s infinite">~</div><div style="position:absolute;top:-18px;left:65%;font-size:12px;color:var(--danger);opacity:0.4;animation:rise 2s ease 0.6s infinite">~</div>';
  } else if(checkin.smell==='musty_moldy'){
    fillColor=`rgba(110,90,60,${fillOp+0.08})`;
    vaporHtml='<div style="position:absolute;top:-20px;left:35%;font-size:16px;color:var(--danger);opacity:0.5;animation:rise 1.8s ease infinite">~</div><div style="position:absolute;top:-26px;left:55%;font-size:14px;color:var(--danger);opacity:0.4;animation:rise 1.8s ease 0.4s infinite">~</div>';
  } else if(checkin.smell==='flour_paste'){
    // neutral — no vapor
  }

  // Bread buddy mood
  const hasDanger=o.hasDanger||false;
  const hasSelections=!!(checkin.bubbles||checkin.smell||checkin.rise||checkin.surface||checkin.consistency);
  let mood='sleep';
  if(o.showStars)mood='celebrate';
  else if(hasDanger)mood='sick';
  else if(hasSelections){
    const goodSigns=['few_small','many_small','large_active','yogurt_fruity','slight','good','doubled','tripled','bubbly','pancake_batter','stretchy'].filter(v=>
      [checkin.bubbles,checkin.smell,checkin.rise,checkin.surface,checkin.consistency].includes(v)).length;
    const badSigns=['rotten','hooch','dry_stiff','runny'].filter(v=>
      [checkin.bubbles,checkin.smell,checkin.rise,checkin.surface,checkin.consistency].includes(v)).length;
    if(goodSigns>=3)mood='happy';
    else if(badSigns>=2)mood='mad';
    else if(goodSigns>=1)mood='normal';
    else mood='normal';
  }
  const moodAnim={sleep:'breadIdle 3s ease-in-out infinite',normal:'breadIdle 2.5s ease-in-out infinite',happy:'breadHappy 1.2s ease-in-out infinite',mad:'breadMad 0.4s ease-in-out infinite',sick:'breadSick 1.5s ease-in-out infinite',celebrate:'breadCelebrate 1s ease-in-out infinite'};
  // Sourdough boule bread buddy
  const crustColor=mood==='sick'?'#8B9B6B':'#C4913B';
  const crumbColor=mood==='sick'?'#A0AB7B':'#E2C48A';
  const darkLine=mood==='sick'?'#6B7B4B':'#8B6530';
  const cheekColor=mood==='happy'||mood==='celebrate'?'#E8A47A':'transparent';
  // Score marks on top — the signature sourdough look
  const scoreMarks=`<path d="M14 10 Q21 6 28 10" fill="none" stroke="${darkLine}" stroke-width="1.2" stroke-linecap="round" opacity="0.6"/><path d="M16 7 Q21 4 26 7" fill="none" stroke="${darkLine}" stroke-width="1" stroke-linecap="round" opacity="0.4"/>`;
  // Flour dusting
  const flour='<circle cx="16" cy="9" r="1" fill="white" opacity="0.15"/><circle cx="24" cy="7" r="0.8" fill="white" opacity="0.12"/><circle cx="20" cy="5" r="0.6" fill="white" opacity="0.1"/><circle cx="28" cy="11" r="0.7" fill="white" opacity="0.1"/>';
  // Eyes
  let eyesL='',eyesR='';
  if(mood==='sleep'){eyesL='<line x1="14" y1="17" x2="18" y2="17" stroke="${darkLine}" stroke-width="1.5" stroke-linecap="round"/>';eyesR='<line x1="24" y1="17" x2="28" y2="17" stroke="${darkLine}" stroke-width="1.5" stroke-linecap="round"/>';}
  else if(mood==='sick'){eyesL='<line x1="14" y1="15" x2="18" y2="19" stroke="${darkLine}" stroke-width="1.5" stroke-linecap="round"/><line x1="18" y1="15" x2="14" y2="19" stroke="${darkLine}" stroke-width="1.5" stroke-linecap="round"/>';eyesR='<line x1="24" y1="15" x2="28" y2="19" stroke="${darkLine}" stroke-width="1.5" stroke-linecap="round"/><line x1="28" y1="15" x2="24" y2="19" stroke="${darkLine}" stroke-width="1.5" stroke-linecap="round"/>';}
  else if(mood==='mad'){eyesL='<circle cx="16" cy="17" r="1.8" fill="${darkLine}"/><line x1="12" y1="13" x2="19" y2="15" stroke="${darkLine}" stroke-width="1.5" stroke-linecap="round"/>';eyesR='<circle cx="26" cy="17" r="1.8" fill="${darkLine}"/><line x1="23" y1="15" x2="30" y2="13" stroke="${darkLine}" stroke-width="1.5" stroke-linecap="round"/>';}
  else{eyesL='<circle cx="16" cy="17" r="2" fill="${darkLine}"/>';eyesR='<circle cx="26" cy="17" r="2" fill="${darkLine}"/>';}
  if(mood==='happy'||mood==='celebrate'){eyesL+='<circle cx="16.6" cy="16.3" r="0.7" fill="white" opacity="0.8"/>';eyesR+='<circle cx="26.6" cy="16.3" r="0.7" fill="white" opacity="0.8"/>';}
  // Mouth
  let mouth='';
  if(mood==='sleep')mouth='<path d="M18 22 Q21 24 24 22" fill="none" stroke="${darkLine}" stroke-width="1" stroke-linecap="round"/>';
  else if(mood==='happy'||mood==='celebrate')mouth='<path d="M16 22 Q21 27 26 22" fill="none" stroke="${darkLine}" stroke-width="1.5" stroke-linecap="round"/>';
  else if(mood==='mad')mouth='<path d="M17 24 Q21 21 25 24" fill="none" stroke="${darkLine}" stroke-width="1.3" stroke-linecap="round"/>';
  else if(mood==='sick')mouth='<path d="M17 23 Q21 21 25 23" fill="none" stroke="${darkLine}" stroke-width="1.2" stroke-linecap="round"/>';
  else mouth='<line x1="18" y1="23" x2="24" y2="23" stroke="${darkLine}" stroke-width="1.2" stroke-linecap="round"/>';
  // Extras
  let extras='';
  if(mood==='sleep')extras='<text x="30" y="14" font-size="7" fill="${darkLine}" opacity="0.5" font-family="Patrick Hand, cursive">z</text><text x="34" y="9" font-size="5" fill="${darkLine}" opacity="0.35" font-family="Patrick Hand, cursive">z</text>';
  if(mood==='celebrate')extras='<text x="8" y="6" font-size="5" fill="var(--clay)">✦</text><text x="32" y="4" font-size="4" fill="var(--clay)">✦</text><text x="4" y="16" font-size="4" fill="var(--clay)">✦</text>';
  if(mood==='sick')extras='<circle cx="30" cy="22" r="2" fill="#8B9B6B" opacity="0.4"/><path d="M31 24 Q32 27 31 29" fill="none" stroke="#8B9B6B" stroke-width="0.8" opacity="0.4"/>';
  // Little feet
  const feet=`<ellipse cx="15" cy="28" rx="4" ry="2" fill="${crustColor}" opacity="0.7"/><ellipse cx="27" cy="28" rx="4" ry="2" fill="${crustColor}" opacity="0.7"/>`;
  // Assemble sourdough buddy
  const b=`<svg viewBox="0 0 42 32" width="56" height="42" xmlns="http://www.w3.org/2000/svg">
    ${feet}
    <ellipse cx="21" cy="18" rx="15" ry="11" fill="${crustColor}"/>
    <ellipse cx="21" cy="14" rx="13" ry="10" fill="${crumbColor}"/>
    <path d="M10 12 Q15 4 21 5 Q27 4 32 12" fill="${crustColor}"/>
    <path d="M12 10 Q17 3 21 4.5 Q25 3 30 10" fill="${crumbColor}" opacity="0.6"/>
    ${scoreMarks}${flour}
    <circle cx="10" cy="20" r="2.5" fill="${cheekColor}" opacity="0.35"/>
    <circle cx="32" cy="20" r="2.5" fill="${cheekColor}" opacity="0.35"/>
    ${eyesL.replace(/\$\{darkLine\}/g,darkLine)}${eyesR.replace(/\$\{darkLine\}/g,darkLine)}
    ${mouth.replace(/\$\{darkLine\}/g,darkLine)}
    ${extras.replace(/\$\{darkLine\}/g,darkLine)}
  </svg>`.replace(/\$\{darkLine\}/g,darkLine);
  const buddyHtml=`<div class="bread-buddy" style="animation:${moodAnim[mood]}">${b}</div>`;

  // Danger detection
  let dangerBadge='';
  if(hasDanger){
    dangerBadge=`<div id="jarWarning" style="position:absolute;top:-8px;right:-8px;width:28px;height:28px;border-radius:50%;background:var(--danger);color:white;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;cursor:pointer;z-index:5;border:2px solid var(--snow);animation:starPulse 2s ease infinite">!</div>`;
  }

  // Stars for day 7 completion
  const showStars=o.showStars||false;
  let starsHtml='';
  if(showStars){
    starsHtml=`
      <span class="material-symbols-outlined" style="position:absolute;top:-18px;left:-12px;font-size:22px;color:var(--clay);animation:starPulse 1.5s ease infinite">star</span>
      <span class="material-symbols-outlined" style="position:absolute;top:-10px;right:-16px;font-size:18px;color:var(--clay-light);animation:starPulse 1.5s ease 0.3s infinite">star</span>
      <span class="material-symbols-outlined" style="position:absolute;top:20px;left:-20px;font-size:14px;color:var(--clay);animation:starPulse 1.5s ease 0.6s infinite">auto_awesome</span>
      <span class="material-symbols-outlined" style="position:absolute;bottom:30px;right:-18px;font-size:16px;color:var(--clay-light);animation:starPulse 1.5s ease 0.9s infinite">auto_awesome</span>
      <span class="material-symbols-outlined" style="position:absolute;bottom:-8px;left:20px;font-size:20px;color:var(--clay);animation:starPulse 1.5s ease 1.2s infinite">star</span>`;
  }

  // Dough top line style
  const topBorder=checkin.surface==='smooth'||!checkin.surface?'2px dashed var(--clay-light)':'2px solid var(--clay-light)';
  // Jar border color shifts with danger
  const jarBorder=hasDanger?'var(--danger)':'var(--clay-light)';

  return `<div id="starterJar" style="position:relative;width:192px;height:256px;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;padding:16px;border:4px solid ${jarBorder};border-radius:255px 15px 225px 15px/15px 225px 15px 255px;background:rgba(196,113,59,0.06);filter:drop-shadow(0 0 10px rgba(196,113,59,0.1));transition:border-color 0.3s">
    ${starsHtml}${dangerBadge}
    <div style="position:absolute;top:-24px;left:50%;transform:translateX(-50%);width:128px;height:32px;border:4px solid ${jarBorder};border-radius:9999px;background:var(--snow);transition:border-color 0.3s"></div>
    <div style="position:absolute;top:16px;left:50%;transform:translateX(-50%);width:144px;height:8px;border:2px solid rgba(196,113,59,0.2);border-radius:9999px"></div>
    <div style="width:100%;height:${dH}%;background:${fillColor};border-radius:0 0 12px 12px;border-top:${topBorder};display:flex;align-items:center;justify-content:center;position:relative;overflow:visible;transition:height 0.5s ease,background 0.3s">
      ${surfaceHtml}${stretchHtml}${crackHtml}${runnyHtml}
      <svg style="position:absolute;inset:0;width:100%;height:100%;overflow:visible" xmlns="http://www.w3.org/2000/svg">${bubSvg}</svg>
      ${vaporHtml}
      ${bCount===0&&!checkin.consistency?'<span class="material-symbols-outlined" style="font-size:32px;color:var(--clay-light);opacity:0.3">bubble_chart</span>':''}
    </div>
    ${buddyHtml}
  </div>`;
}

function renderStarter(){
  const c=document.getElementById('starterContainer');
  const mode=state.starter.mode;
  c.innerHTML=`
    <div class="starter-tabs">
      <button class="starter-tab${mode==='creation'?' active':''}" data-smode="creation">Crear Starter</button>
      <button class="starter-tab${mode==='maintenance'?' active':''}" data-smode="maintenance">Mantenimiento</button>
    </div>
    <div id="starterModeContent"></div>`;
  c.querySelectorAll('.starter-tab').forEach(tab=>{
    tab.addEventListener('click',()=>{
      state.starter.mode=tab.dataset.smode;saveState();renderStarter();
    });
  });
  if(mode==='creation')renderCreationMode();
  else renderMaintenanceMode();
}

// ═══ CREATION MODE ═══
function renderCreationMode(){
  const mc=document.getElementById('starterModeContent');
  const currentDay=state.starter.creationDay;
  const dayLabels={1:'<span class="material-symbols-outlined" style="font-size:16px">cookie</span>',2:'1',3:'2',4:'3',5:'4',6:'5',7:'6'};
  let dayNav='<div class="creation-days">';
  for(let d=1;d<=7;d++){
    const checkin=state.starter.dailyCheckins[d];
    const isCurrent=d===currentDay;
    const isCompleted=checkin&&checkin.completed;
    let cls='creation-day-btn';
    if(isCurrent)cls+=' current';
    if(isCompleted)cls+=' completed';
    else if(checkin)cls+=' has-data';
    dayNav+=`<button class="${cls}" data-cday="${d}">${isCompleted?'✓':dayLabels[d]}</button>`;
  }
  dayNav+='</div>';
  mc.innerHTML=dayNav+'<div id="creationDayContent"></div>';
  mc.querySelectorAll('.creation-day-btn').forEach(btn=>{
    btn.addEventListener('click',()=>{
      state.starter.creationDay=parseInt(btn.dataset.cday);saveState();renderCreationMode();
    });
  });
  if(currentDay===1)renderCreationDay1();
  else renderCreationDayCheckin(currentDay);
}
