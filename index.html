<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="theme-color" content="#FBF7F2">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>Pan de Casa</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Literata:opsz,wght@7..72,400;7..72,600;7..72,700&family=Outfit:wght@300;400;500;600;700&family=Caveat:wght@400;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --cloud:#FBF7F2;--snow:#FFFFFF;--linen:#F5EDE3;
  --clay:#C07C5A;--clay-light:#E8C4A0;--clay-pale:#F3DFD0;
  --bark:#3D2E22;--stone:#9B8A7A;--sage:#8BAB7F;
  --danger:#C85A3A;--shadow:rgba(61,46,34,0.06);
  --radius:20px;--radius-sm:12px;--nav-h:72px;
}
html{height:100%;-webkit-text-size-adjust:100%}
body{
  font-family:'Outfit',sans-serif;background:var(--cloud);color:var(--bark);
  min-height:100%;overscroll-behavior:none;position:relative;
  -webkit-tap-highlight-color:transparent;font-weight:400;
}
body::after{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:9999;opacity:0.015;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size:200px 200px;
}
.app-header{
  position:sticky;top:0;z-index:50;
  background:var(--cloud);
  padding:14px 20px;padding-top:calc(14px + env(safe-area-inset-top,0px));
  border-bottom:1px solid rgba(61,46,34,0.08);
}
.header-top{display:flex;align-items:center;justify-content:space-between}
.header-brand{display:flex;align-items:center;gap:10px}
.header-title{font-family:'Literata',serif;font-weight:700;font-size:1.35rem;color:var(--bark);letter-spacing:-0.02em}
.header-day{font-size:0.78rem;color:var(--stone);font-weight:500;font-family:'Outfit',sans-serif}
.journey-bar{height:3px;background:var(--linen);border-radius:2px;margin-top:10px;overflow:hidden}
.journey-fill{height:100%;background:linear-gradient(90deg,var(--clay),var(--clay-light));border-radius:2px;transition:width 0.6s ease;width:0%}
.app-main{position:relative;min-height:calc(100vh - 140px);padding-bottom:calc(var(--nav-h) + env(safe-area-inset-bottom,0px) + 8px)}
.page{display:none;padding:20px 20px 28px;animation:pageIn 0.4s ease}
.page.active{display:block}
@keyframes pageIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.page-title{font-family:'Literata',serif;font-size:1.3rem;font-weight:700;margin-bottom:18px;color:var(--bark)}
.page-subtitle{font-size:0.82rem;color:var(--stone);margin-top:-12px;margin-bottom:18px;font-weight:400}
.bottom-nav{
  position:fixed;bottom:0;left:0;right:0;z-index:50;
  background:var(--snow);display:flex;
  padding-bottom:env(safe-area-inset-bottom,0px);
  box-shadow:0 -1px 12px rgba(61,46,34,0.06);
  border-top:1px solid rgba(61,46,34,0.05);
}
.nav-btn{
  flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;
  padding:10px 2px 8px;border:none;background:none;cursor:pointer;
  transition:all 0.2s;position:relative;color:var(--stone);
}
.nav-icon{display:flex;align-items:center;justify-content:center;width:24px;height:24px;transition:all 0.2s}
.nav-icon svg{width:22px;height:22px}
.nav-label{font-size:0.6rem;font-weight:500;color:var(--stone);transition:color 0.2s;letter-spacing:0.02em;font-family:'Outfit',sans-serif}
.nav-btn.active{color:var(--clay)}
.nav-btn.active .nav-label{color:var(--clay)}
.nav-btn.active::after{
  content:'';position:absolute;bottom:calc(env(safe-area-inset-bottom,0px) + 2px);left:35%;right:35%;height:3px;
  background:var(--clay);border-radius:2px;
}
.card{
  background:var(--snow);border-radius:var(--radius);padding:20px;
  margin-bottom:14px;box-shadow:0 2px 12px var(--shadow);
  border:1px solid rgba(61,46,34,0.04);transition:transform 0.15s,box-shadow 0.15s;
  cursor:pointer;
}
.card:active{transform:scale(0.985);box-shadow:0 1px 6px var(--shadow)}
.day-card{display:flex;align-items:center;gap:16px;position:relative;border-left:3px solid var(--clay-light);padding-left:18px;border-radius:var(--radius)}
.day-num{
  font-family:'Literata',serif;font-size:1.1rem;font-weight:700;color:var(--clay);
  min-width:42px;height:42px;display:flex;align-items:center;justify-content:center;
  background:var(--clay-pale);border-radius:50%;line-height:1;flex-shrink:0;
}
.day-info{flex:1}
.day-title{font-family:'Literata',serif;font-weight:600;font-size:0.95rem;color:var(--bark);display:flex;align-items:center;gap:6px}
.day-subtitle{font-size:0.78rem;color:var(--stone);margin-top:3px;font-weight:400}
.day-meta{display:flex;align-items:center;gap:10px;margin-top:8px;font-size:0.7rem;color:var(--stone)}
.day-dots{display:flex;gap:3px}
.day-dot{width:5px;height:5px;border-radius:50%;background:var(--linen)}
.day-dot.filled{background:var(--clay)}
.day-check{
  width:28px;height:28px;border-radius:50%;border:2px solid var(--linen);
  display:flex;align-items:center;justify-content:center;font-size:0.8rem;
  transition:all 0.3s;flex-shrink:0;
}
.day-check.done{background:var(--sage);border-color:var(--sage);color:white}
.day-card.completed{opacity:0.55}
.starter-badge{font-size:0.68rem;background:var(--clay-pale);padding:2px 8px;border-radius:10px;color:var(--clay);font-weight:500}
/* Challenge selector */
.challenge-tabs{display:flex;gap:10px;margin-bottom:20px;overflow-x:auto;scrollbar-width:none;padding:2px}
.challenge-tabs::-webkit-scrollbar{display:none}
.challenge-tab{
  flex:1;min-width:140px;padding:16px;border-radius:var(--radius);border:1.5px solid var(--linen);
  background:var(--snow);cursor:pointer;transition:all 0.2s;text-align:center;
}
.challenge-tab.active{border-color:var(--clay);background:rgba(192,124,90,0.06)}
.challenge-tab .ct-emoji{font-size:1.4rem}
.challenge-tab .ct-name{font-family:'Literata',serif;font-weight:600;font-size:0.85rem;margin-top:4px;color:var(--bark)}
.challenge-tab .ct-progress{font-size:0.7rem;color:var(--stone);margin-top:3px}
/* Sheet */
.sheet-overlay{position:fixed;inset:0;background:rgba(61,46,34,0.3);opacity:0;pointer-events:none;transition:opacity 0.3s;z-index:99}
.sheet-overlay.active{opacity:1;pointer-events:auto}
.recipe-sheet{
  position:fixed;bottom:0;left:0;right:0;max-height:88vh;
  background:var(--cloud);border-radius:24px 24px 0 0;
  transform:translateY(100%);transition:transform 0.35s cubic-bezier(0.4,0,0.2,1);
  overflow-y:auto;z-index:100;padding:20px 24px calc(24px + env(safe-area-inset-bottom,0px));
  -webkit-overflow-scrolling:touch;
}
.recipe-sheet.active{transform:translateY(0)}
.sheet-handle{width:36px;height:4px;background:var(--linen);border-radius:2px;margin:0 auto 18px}
.sheet-title{font-family:'Literata',serif;font-size:1.3rem;font-weight:700;margin-bottom:4px;color:var(--bark)}
.sheet-subtitle{font-size:0.82rem;color:var(--stone);margin-bottom:22px}
.sheet-section{margin-bottom:24px}
.sheet-section h3{font-family:'Literata',serif;font-size:0.95rem;font-weight:600;margin-bottom:12px;color:var(--stone);display:flex;align-items:center;gap:8px}
.ingredient-list{list-style:none}
.ingredient-list li{padding:8px 0;border-bottom:1px solid rgba(61,46,34,0.06);font-size:0.88rem;display:flex;align-items:center;gap:8px}
.ingredient-list li::before{content:'·';color:var(--clay);font-weight:bold;font-size:1.2rem}
.step-list{list-style:none;counter-reset:step}
.step-list li{counter-increment:step;padding:10px 0 10px 40px;border-bottom:1px solid rgba(61,46,34,0.06);font-size:0.86rem;position:relative;line-height:1.6}
.step-list li::before{
  content:counter(step);position:absolute;left:0;top:10px;
  width:26px;height:26px;border-radius:50%;background:var(--clay-pale);color:var(--clay);
  font-size:0.72rem;font-weight:700;display:flex;align-items:center;justify-content:center;
  font-family:'Literata',serif;
}
.sheet-tip{
  background:rgba(139,171,127,0.08);border-left:3px solid var(--sage);
  padding:14px 16px;border-radius:0 var(--radius-sm) var(--radius-sm) 0;
  font-family:'Caveat',cursive;font-size:1.05rem;color:var(--stone);line-height:1.4;
}
.sheet-timers{display:flex;flex-wrap:wrap;gap:8px}
.sheet-timer-btn{
  padding:10px 16px;border-radius:24px;border:1.5px solid var(--clay-light);
  background:rgba(192,124,90,0.05);color:var(--bark);font-size:0.78rem;
  font-weight:500;cursor:pointer;transition:all 0.2s;font-family:'Outfit',sans-serif;
}
.sheet-timer-btn:active{background:var(--clay);color:white;border-color:var(--clay)}
/* Starter */
.starter-container{display:flex;flex-direction:column;align-items:center;gap:24px}
.jar-wrapper{position:relative;width:160px;height:230px}
.jar-svg{width:100%;height:100%}
.bubble{
  position:absolute;border-radius:50%;
  background:radial-gradient(circle at 30% 30%,rgba(192,124,90,0.15),rgba(192,124,90,0.03));
  border:1px solid rgba(192,124,90,0.1);animation:rise var(--dur,4s) ease-in-out infinite;
  animation-delay:var(--del,0s);
}
@keyframes rise{0%{transform:translateY(0) scale(1);opacity:0}10%{opacity:0.6}90%{opacity:0.4}100%{transform:translateY(calc(-1 * var(--travel,150px))) scale(0.4);opacity:0}}
.starter-status{text-align:center}
.starter-level{font-family:'Literata',serif;font-size:1.2rem;font-weight:700;color:var(--bark)}
.starter-sublevel{font-size:0.82rem;color:var(--stone);margin-top:3px}
.btn{
  flex:1;padding:13px 18px;border-radius:var(--radius-sm);border:none;
  font-family:'Outfit',sans-serif;font-weight:600;font-size:0.88rem;
  cursor:pointer;transition:all 0.2s;
}
.btn-primary{background:var(--clay);color:white;box-shadow:0 2px 10px rgba(192,124,90,0.25)}
.btn-primary:active{background:#A8694D;transform:scale(0.97)}
.btn-secondary{background:var(--snow);color:var(--bark);border:1.5px solid var(--linen)}
.btn-secondary:active{background:var(--linen)}
.starter-actions{display:flex;gap:10px;width:100%;max-width:360px}
.starter-timeline{display:flex;gap:5px;width:100%;overflow-x:auto;padding:8px 0;scrollbar-width:none;-webkit-overflow-scrolling:touch;justify-content:center;flex-wrap:wrap}
.starter-timeline::-webkit-scrollbar{display:none}
.timeline-day{
  min-width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-size:0.65rem;font-weight:600;border:2px solid var(--linen);color:var(--stone);flex-shrink:0;transition:all 0.3s;
}
.timeline-day.fed{background:var(--sage);border-color:var(--sage);color:white}
.timeline-day.today{border-color:var(--clay);color:var(--clay)}
.timeline-day.today.fed{background:var(--clay);border-color:var(--clay);color:white}
.notes-input{
  width:100%;max-width:360px;padding:12px 16px;border:1.5px solid var(--linen);border-radius:var(--radius-sm);
  font-family:'Caveat',cursive;font-size:1rem;background:var(--snow);color:var(--bark);
  resize:none;outline:none;transition:border-color 0.2s;
}
.notes-input:focus{border-color:var(--clay)}
.feed-entry{padding:12px 0;border-bottom:1px solid rgba(61,46,34,0.06);display:flex;align-items:flex-start;gap:12px;font-size:0.85rem}
.feed-time{color:var(--clay);font-weight:600;min-width:60px;font-size:0.76rem}
.feed-notes{color:var(--stone);font-family:'Caveat',cursive;font-size:1rem}
/* Guide cards */
.guide-card{background:var(--snow);border-radius:var(--radius);margin-bottom:10px;border:1px solid rgba(61,46,34,0.06);overflow:hidden;width:100%;max-width:400px}
.guide-header{padding:16px 18px;font-weight:600;font-size:0.88rem;display:flex;justify-content:space-between;align-items:center;cursor:pointer;color:var(--bark)}
.guide-header::after{content:'›';color:var(--stone);transition:transform 0.3s;font-size:1rem}
.guide-card.open .guide-header::after{transform:rotate(90deg)}
.guide-body{max-height:0;overflow:hidden;transition:max-height 0.35s ease;padding:0 18px}
.guide-card.open .guide-body{max-height:600px;padding:0 18px 16px}
.guide-body p{font-size:0.84rem;line-height:1.65;margin-bottom:6px;color:var(--stone)}
.guide-body strong{color:var(--bark)}
.guide-measure{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--linen);border-radius:var(--radius-sm);margin:6px 0;font-size:0.86rem;font-weight:600}
.guide-measure .gm-qty{color:var(--clay);min-width:50px;font-family:'Literata',serif;font-size:1.1rem}
/* Reminder */
.reminder-row{display:flex;align-items:center;gap:10px;width:100%;max-width:360px;flex-wrap:wrap}
.time-input{padding:10px;border:1.5px solid var(--linen);border-radius:var(--radius-sm);font-family:'Outfit',sans-serif;font-size:0.88rem;background:var(--snow);outline:none;width:100px;text-align:center}
.time-input:focus{border-color:var(--clay)}
.reminder-label{font-size:0.8rem;color:var(--stone);font-weight:600;min-width:60px}
.reminder-toggle{
  width:48px;height:28px;border-radius:14px;border:none;cursor:pointer;
  background:var(--linen);position:relative;transition:background 0.3s;
}
.reminder-toggle.on{background:var(--sage)}
.reminder-toggle::after{
  content:'';position:absolute;top:3px;left:3px;width:22px;height:22px;
  border-radius:50%;background:white;transition:transform 0.3s;box-shadow:0 1px 4px rgba(0,0,0,0.12);
}
.reminder-toggle.on::after{transform:translateX(20px)}
/* Shopping */
.shop-tabs{display:flex;gap:8px;margin-bottom:18px;overflow-x:auto;scrollbar-width:none;padding-bottom:4px}
.shop-tabs::-webkit-scrollbar{display:none}
.shop-tab{
  padding:9px 16px;border-radius:24px;border:1.5px solid var(--linen);
  background:var(--snow);font-size:0.76rem;font-weight:500;white-space:nowrap;
  cursor:pointer;transition:all 0.2s;font-family:'Outfit',sans-serif;color:var(--stone);
}
.shop-tab.active{background:var(--clay);color:white;border-color:var(--clay)}
.shop-item{display:flex;align-items:center;gap:14px;padding:14px 0;border-bottom:1px solid rgba(61,46,34,0.05)}
.shop-check{
  width:22px;height:22px;border-radius:8px;border:2px solid var(--linen);
  display:flex;align-items:center;justify-content:center;cursor:pointer;
  transition:all 0.2s;flex-shrink:0;font-size:0.72rem;
}
.shop-check.checked{background:var(--sage);border-color:var(--sage);color:white}
.shop-name{flex:1;font-size:0.88rem}
.shop-name.checked{text-decoration:line-through;color:var(--stone)}
.shop-qty{font-size:0.76rem;color:var(--stone);font-weight:500;white-space:nowrap}
.shop-progress{font-size:0.76rem;color:var(--stone);text-align:right;margin-bottom:14px}
/* Timer */
.timer-container{display:flex;flex-direction:column;align-items:center;gap:28px;padding-top:12px}
.timer-ring-wrap{position:relative;width:220px;height:220px}
.timer-svg{width:100%;height:100%;transform:rotate(-90deg)}
.timer-bg{fill:none;stroke:var(--linen);stroke-width:7}
.timer-progress{fill:none;stroke:var(--clay);stroke-width:7;stroke-linecap:round;transition:stroke-dashoffset 0.5s linear}
.timer-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.timer-time{font-family:'Literata',serif;font-size:2.8rem;font-weight:700;color:var(--bark);letter-spacing:-0.02em}
.timer-name{font-size:0.82rem;color:var(--stone);font-weight:500;margin-top:4px}
.timer-controls{display:flex;gap:14px}
.timer-ctrl{width:52px;height:52px;border-radius:50%;border:none;display:flex;align-items:center;justify-content:center;font-size:1.2rem;cursor:pointer;transition:all 0.2s}
.timer-ctrl.play{background:var(--clay);color:white;box-shadow:0 3px 14px rgba(192,124,90,0.3)}
.timer-ctrl.play:active{transform:scale(0.92)}
.timer-ctrl.reset{background:var(--snow);border:2px solid var(--linen);color:var(--stone)}
.timer-presets{display:grid;grid-template-columns:1fr 1fr;gap:10px;width:100%;max-width:360px}
.preset-btn{padding:16px;border-radius:var(--radius);border:1.5px solid rgba(61,46,34,0.06);background:var(--snow);cursor:pointer;transition:all 0.2s;text-align:left}
.preset-btn:active{border-color:var(--clay);background:rgba(192,124,90,0.04)}
.preset-btn.active-preset{border-color:var(--clay);background:rgba(192,124,90,0.06)}
.preset-name{font-weight:600;font-size:0.86rem;color:var(--bark)}
.preset-time{font-size:0.76rem;color:var(--stone);margin-top:3px}
.timer-done{animation:pulse 0.6s ease infinite alternate}
@keyframes pulse{from{opacity:1}to{opacity:0.5}}
.custom-timer-row{display:flex;gap:8px;width:100%;max-width:360px;align-items:center}
.custom-input{flex:1;padding:13px;border-radius:var(--radius-sm);border:1.5px solid var(--linen);font-family:'Outfit',sans-serif;font-size:0.88rem;text-align:center;background:var(--snow);outline:none}
.custom-input:focus{border-color:var(--clay)}
/* Chat */
.chat-container{display:flex;flex-direction:column;height:calc(100vh - 140px - env(safe-area-inset-top,0px) - env(safe-area-inset-bottom,0px))}
.chat-messages{flex:1;overflow-y:auto;padding:8px 0;-webkit-overflow-scrolling:touch;display:flex;flex-direction:column;gap:12px}
.chat-msg{max-width:85%;padding:14px 18px;border-radius:20px;font-size:0.88rem;line-height:1.55;word-wrap:break-word}
.chat-msg.user{align-self:flex-end;background:var(--clay);color:white;border-bottom-right-radius:6px}
.chat-msg.assistant{align-self:flex-start;background:var(--snow);color:var(--bark);border-bottom-left-radius:6px;box-shadow:0 2px 8px var(--shadow)}
.chat-msg.system{align-self:center;background:rgba(192,124,90,0.06);color:var(--stone);font-size:0.78rem;text-align:center;border-radius:var(--radius-sm);max-width:95%}
.chat-msg.assistant p{margin:0 0 8px}.chat-msg.assistant p:last-child{margin:0}
.chat-msg.assistant strong{color:var(--clay)}
.chat-typing{align-self:flex-start;padding:14px 22px;display:flex;gap:4px}
.typing-dot{width:7px;height:7px;border-radius:50%;background:var(--clay-light);animation:typingBounce 1.4s ease-in-out infinite}
.typing-dot:nth-child(2){animation-delay:0.2s}.typing-dot:nth-child(3){animation-delay:0.4s}
@keyframes typingBounce{0%,60%,100%{transform:translateY(0);opacity:0.4}30%{transform:translateY(-8px);opacity:1}}
.chat-input-area{display:flex;gap:8px;padding:14px 0 4px;border-top:1px solid rgba(61,46,34,0.06)}
.chat-input{flex:1;padding:12px 18px;border-radius:24px;border:1.5px solid var(--linen);font-family:'Outfit',sans-serif;font-size:0.88rem;background:var(--snow);outline:none;transition:border-color 0.2s}
.chat-input:focus{border-color:var(--clay)}
.chat-send{width:44px;height:44px;border-radius:50%;border:none;background:var(--clay);color:white;font-size:1.1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.2s;flex-shrink:0}
.chat-send:disabled{opacity:0.4}.chat-send:not(:disabled):active{transform:scale(0.92)}
.chat-suggestions{display:flex;flex-wrap:wrap;gap:6px;padding:8px 0}
.chat-suggest{padding:7px 14px;border-radius:20px;border:1px solid var(--linen);background:var(--snow);font-size:0.76rem;color:var(--stone);cursor:pointer;transition:all 0.2s;font-family:'Outfit',sans-serif}
.chat-suggest:active{border-color:var(--clay);color:var(--clay)}
.api-setup{display:flex;flex-direction:column;align-items:center;gap:18px;padding:36px 16px;text-align:center}
.api-setup h3{font-family:'Literata',serif;font-size:1.15rem;color:var(--bark)}
.api-setup p{font-size:0.84rem;color:var(--stone);line-height:1.55;max-width:320px}
.api-input{width:100%;max-width:320px;padding:13px 16px;border-radius:var(--radius-sm);border:1.5px solid var(--linen);font-family:monospace;font-size:0.8rem;background:var(--snow);outline:none}
.api-input:focus{border-color:var(--clay)}

// ═══ STATE ═══
const STATE_KEY='pan-de-casa-v2';
const defaultState={
  completedDays:{},starterFeedings:[],checkedItems:{},
  currentTab:'plan',activeChallenge:'pan-de-casa',activeShopTab:'basicos1',
  apiKey:'',chatHistory:[],
  feedingTimes:['08:00','20:00'],remindersOn:false,lastFeedNotif:''
};
let state=loadState();
let timerState={running:false,paused:false,name:'',totalSec:0,remainSec:0,interval:null};

function loadState(){
  try{const s=localStorage.getItem(STATE_KEY);return s?{...defaultState,...JSON.parse(s)}:{...defaultState}}
  catch(e){return{...defaultState}}
}
function saveState(){localStorage.setItem(STATE_KEY,JSON.stringify(state))}
function getChallenge(){return CHALLENGES.find(c=>c.id===state.activeChallenge)||CHALLENGES[0]}
function getCompleted(){return state.completedDays[state.activeChallenge]||[]}
function setCompleted(arr){state.completedDays[state.activeChallenge]=arr;saveState()}
function getNextDay(){const done=getCompleted();for(let i=1;i<=14;i++)if(!done.includes(i))return i;return 14}

// ═══ NAV ═══
document.querySelectorAll('.nav-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    const p=btn.dataset.page;
    document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    document.querySelectorAll('.page').forEach(pg=>pg.classList.remove('active'));
    document.getElementById('page-'+p).classList.add('active');
    state.currentTab=p;saveState();
    if(p==='starter')renderStarter();if(p==='shopping')renderShopping();
    if(p==='timers')renderTimers();if(p==='chat')renderChat();
  });
});

// ═══ HEADER ═══
function updateHeader(){
  const done=getCompleted().length;const ch=getChallenge();
  document.getElementById('headerDay').textContent=`Día ${getNextDay()} / 14`;
  document.getElementById('journeyFill').style.width=((done/14)*100)+'%';
  document.querySelector('.header-title').textContent=ch.name;
}

// ═══ PLAN PAGE ═══
function renderChallengeTabs(){
  const el=document.getElementById('challengeTabs');
  el.innerHTML=CHALLENGES.map(c=>{
    const done=(state.completedDays[c.id]||[]).length;
    return `<div class="challenge-tab${c.id===state.activeChallenge?' active':''}" data-ch="${c.id}">
      <div class="ct-emoji">${c.emoji}</div><div class="ct-name">${c.name}</div>
      <div class="ct-progress">${done}/14 completados</div></div>`;
  }).join('');
  el.querySelectorAll('.challenge-tab').forEach(t=>{
    t.addEventListener('click',()=>{
      state.activeChallenge=t.dataset.ch;
      state.activeShopTab=getChallenge().shopping[0].id;
      saveState();renderChallengeTabs();renderPlan();updateHeader();
    });
  });
}

function renderPlan(){
  const ch=getChallenge();const done=getCompleted();
  const container=document.getElementById('dayCards');
  container.innerHTML=ch.days.map(d=>{
    const isDone=done.includes(d.day);
    const dots=Array.from({length:5},(_,i)=>`<span class="day-dot${i<d.difficulty?' filled':''}"></span>`).join('');
    return `<div class="card day-card${isDone?' completed':''}" data-day="${d.day}">
      <div class="day-num">${d.day}</div><div class="day-info">
        <div class="day-title">${d.title}</div>
        <div class="day-subtitle">${d.subtitle}</div>
        <div class="day-meta"><div class="day-dots">${dots}</div><span>${d.totalTime}</span>
        ${d.starter?'<span class="starter-badge">Alimentar</span>':''}</div>
      </div><div class="day-check${isDone?' done':''}" data-check="${d.day}">${isDone?'✓':''}</div></div>`;
  }).join('');
  container.querySelectorAll('.day-check').forEach(ch=>{
    ch.addEventListener('click',e=>{
      e.stopPropagation();const day=parseInt(ch.dataset.check);let arr=getCompleted();
      if(arr.includes(day))arr=arr.filter(d=>d!==day);else arr.push(day);
      setCompleted(arr);renderPlan();updateHeader();
    });
  });
  container.querySelectorAll('.day-card').forEach(card=>{
    card.addEventListener('click',()=>openRecipeSheet(parseInt(card.dataset.day)));
  });
}

// ═══ RECIPE SHEET ═══

document.getElementById('sheetOverlay').addEventListener('click',closeSheet);

// ═══ STARTER PAGE ═══
function getStarterActivity(){
  const f=state.starterFeedings.length;
  if(f===0)return{level:0,label:'Sin iniciar',emoji:'😴',desc:'Inicia tu masa madre'};
  if(f<4)return{level:1,label:'Recién nacida',emoji:'🌱',desc:'Sigue alimentando 2x/día'};
  if(f<10)return{level:2,label:'Despertando',emoji:'🫧',desc:'Mostrando señales de vida'};
  if(f<18)return{level:3,label:'Activa',emoji:'💪',desc:'¡Casi lista para pan!'};
  return{level:4,label:'¡Muy activa!',emoji:'🔥',desc:'¡Lista para sourdough!'};
}

        <defs><clipPath id="jarClip"><path d="M32 48 L32 190 C32 210 44 222 62 222 L98 222 C116 222 128 210 128 190 L128 48 Z"/></clipPath></defs>
        <ellipse cx="80" cy="${Math.round(222 - (222-48)*(dH/100))}" rx="46" ry="4" fill="#E8C4A0" opacity="0.5"/>
        <line x1="50" y1="80" x2="50" y2="180" stroke="#C07C5A" opacity="0.06" stroke-width="0.8"/>

      <span class="reminder-label">Noche:</span><input type="time" class="time-input" id="ft2" value="${ft[1]}">

      <div class="section-divider">Guía Completa de Masa Madre</div>
      ${STARTER_GUIDE.map(g=>`<div class="guide-card"><div class="guide-header" onclick="this.parentElement.classList.toggle('open')">${g.title}</div><div class="guide-body">${g.body}</div></div>`).join('')}

// ═══ REMINDERS ═══
let reminderInterval;
function setupReminders(){
  if(reminderInterval)clearInterval(reminderInterval);
  if(!state.remindersOn)return;
  reminderInterval=setInterval(checkFeedReminder,60000);
  checkFeedReminder();
}
function checkFeedReminder(){
  if(!state.remindersOn)return;
  const now=new Date();const t=String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0');
  const today=now.toDateString();
  (state.feedingTimes||[]).forEach(ft=>{
    if(t===ft&&state.lastFeedNotif!==today+'-'+ft){
      sendNotification('🫙 ¡Hora de alimentar tu masa madre!',`Son las ${ft}. Necesita: 50g harina + 50g agua filtrada tibia.`);
      state.lastFeedNotif=today+'-'+ft;saveState();}});
}

// ═══ SHOPPING ═══
function renderShopping(){
  const shop=getChallenge().shopping;
  const tabsEl=document.getElementById('shopTabs');
  if(!shop.find(s=>s.id===state.activeShopTab))state.activeShopTab=shop[0].id;
  tabsEl.innerHTML=shop.map(s=>`<button class="shop-tab${s.id===state.activeShopTab?' active':''}" data-shop="${s.id}">${s.icon} ${s.title}</button>`).join('');
  tabsEl.querySelectorAll('.shop-tab').forEach(t=>{t.addEventListener('click',()=>{state.activeShopTab=t.dataset.shop;saveState();renderShopping()})});
  const list=shop.find(s=>s.id===state.activeShopTab);if(!list)return;
  if(!state.checkedItems[list.id])state.checkedItems[list.id]=[];
  const checked=state.checkedItems[list.id];
  document.getElementById('shopProgress').textContent=`${checked.length} / ${list.items.length} — ${list.subtitle}`;
  document.getElementById('shopList').innerHTML=list.items.map((item,i)=>{
    const ch=checked.includes(i);
    return `<div class="shop-item" data-idx="${i}"><div class="shop-check${ch?' checked':''}">${ch?'✓':''}</div><div class="shop-name${ch?' checked':''}">${item.name}</div><div class="shop-qty">${item.qty}</div></div>`
  }).join('');
  document.getElementById('shopList').querySelectorAll('.shop-item').forEach(item=>{
    item.addEventListener('click',()=>{
      const idx=parseInt(item.dataset.idx);const key=state.activeShopTab;
      if(!state.checkedItems[key])state.checkedItems[key]=[];
      if(state.checkedItems[key].includes(idx))state.checkedItems[key]=state.checkedItems[key].filter(i=>i!==idx);
      else state.checkedItems[key].push(idx);saveState();renderShopping()})});
}

// ═══ TIMER ═══
function renderTimers(){
  const c=document.getElementById('timerContainer');const circ=2*Math.PI*90;
  const off=timerState.totalSec>0?circ*(1-timerState.remainSec/timerState.totalSec):0;
  const mm=String(Math.floor(timerState.remainSec/60)).padStart(2,'0');
  const ss=String(timerState.remainSec%60).padStart(2,'0');
  const isDone=timerState.totalSec>0&&timerState.remainSec===0&&!timerState.running;
  c.innerHTML=`
    <div class="timer-ring-wrap"><svg viewBox="0 0 200 200" class="timer-svg">
      <circle cx="100" cy="100" r="90" class="timer-bg"/>
      <circle cx="100" cy="100" r="90" class="timer-progress" stroke-dasharray="${circ}" stroke-dashoffset="${off}" ${isDone?'style="stroke:var(--danger)"':''}/></svg>
      <div class="timer-center"><div class="timer-time${isDone?' timer-done':''}">${mm}:${ss}</div>
        <div class="timer-name">${timerState.name||'Selecciona un timer'}</div></div></div>
    <div class="timer-controls">
      <button class="timer-ctrl reset" id="timerReset">↺</button>
      <button class="timer-ctrl play" id="timerPlay">${timerState.running?'⏸':'▶'}</button></div>
    <div class="timer-presets">${TIMER_PRESETS.map(p=>`<button class="preset-btn${timerState.name===p.name?' active-preset':''}" data-name="${p.name}" data-min="${p.min}">
      <div class="preset-name">${p.emoji} ${p.name}</div><div class="preset-time">${p.min} min</div></button>`).join('')}</div>
    <div class="custom-timer-row"><input type="number" class="custom-input" id="customMin" placeholder="Minutos" min="1" max="999">
      <button class="btn btn-primary" id="customStart" style="flex:0 0 auto;padding:12px 20px">Iniciar</button></div>`;
  c.querySelectorAll('.preset-btn').forEach(b=>{b.addEventListener('click',()=>startTimerPreset(b.dataset.name,parseInt(b.dataset.min)))});
  document.getElementById('timerPlay').addEventListener('click',toggleTimer);
  document.getElementById('timerReset').addEventListener('click',resetTimer);
  document.getElementById('customStart').addEventListener('click',()=>{const m=parseInt(document.getElementById('customMin').value);if(m>0)startTimerPreset('Personalizado',m)});
}
function startTimerPreset(n,m){clearInterval(timerState.interval);timerState={running:true,paused:false,name:n,totalSec:m*60,remainSec:m*60,interval:null};timerState.interval=setInterval(tickTimer,1000);renderTimers();requestNotificationPermission()}
function toggleTimer(){if(timerState.totalSec===0)return;if(timerState.running){clearInterval(timerState.interval);timerState.running=false;timerState.paused=true}else if(timerState.remainSec>0){timerState.running=true;timerState.paused=false;timerState.interval=setInterval(tickTimer,1000)}renderTimers()}
function resetTimer(){clearInterval(timerState.interval);timerState={running:false,paused:false,name:'',totalSec:0,remainSec:0,interval:null};renderTimers();document.title='Pan de Casa'}
function tickTimer(){if(timerState.remainSec>0){timerState.remainSec--;updateTimerDisplay();if(timerState.remainSec===0){clearInterval(timerState.interval);timerState.running=false;onTimerDone()}}}
function updateTimerDisplay(){const mm=String(Math.floor(timerState.remainSec/60)).padStart(2,'0');const ss=String(timerState.remainSec%60).padStart(2,'0');const te=document.querySelector('.timer-time');if(te)te.textContent=mm+':'+ss;const circ=2*Math.PI*90;const off=circ*(1-timerState.remainSec/timerState.totalSec);const p=document.querySelector('.timer-progress');if(p)p.setAttribute('stroke-dashoffset',off);document.title=mm+':'+ss+' — Pan de Casa'}
function onTimerDone(){playChime();sendNotification('⏱️ ¡'+timerState.name+' listo!','Tu '+timerState.name.toLowerCase()+' ha terminado.');renderTimers();document.title='Pan de Casa'}

// ═══ AUDIO ═══
function playChime(){try{const x=new(window.AudioContext||window.webkitAudioContext)();[523,659,784,1047].forEach((f,i)=>{const o=x.createOscillator();const g=x.createGain();o.connect(g);g.connect(x.destination);o.frequency.value=f;o.type='sine';const t=x.currentTime+i*0.18;g.gain.setValueAtTime(0.18,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.6);o.start(t);o.stop(t+0.6)})}catch(e){}}

// ═══ NOTIFICATIONS ═══
function requestNotificationPermission(){if('Notification'in window&&Notification.permission==='default')Notification.requestPermission()}
function sendNotification(t,b){if('Notification'in window&&Notification.permission==='granted')new Notification(t,{body:b})}

// ═══ CHAT ═══
function renderChat(){
  const c=document.getElementById('chatContainer');
  if(!state.apiKey){
    c.innerHTML=`<div class="api-setup"><svg width="48" height="48" viewBox="0 0 48 48" fill="none"><path d="M36 20c0 7.7-7 14-15.5 14a17 17 0 01-6.9-1.4L6 36l3.1-6.9A13 13 0 016 20C6 12.3 13 6 20.5 6S36 12.3 36 20z" fill="#F3DFD0" stroke="#C07C5A" stroke-width="2"/><circle cx="15" cy="20" r="1.5" fill="#C07C5A"/><circle cx="21" cy="20" r="1.5" fill="#C07C5A"/><circle cx="27" cy="20" r="1.5" fill="#C07C5A"/></svg><h3>Tu Asistente Panadero</h3>
      <p>Conecta tu API key de Anthropic para hacer preguntas. El chat sabe tu día, receta y estado del starter.</p>
      <input type="password" class="api-input" id="apiKeyInput" placeholder="sk-ant-...">
      <button class="btn btn-primary" id="saveApiKey" style="width:100%;max-width:320px">Guardar API Key</button>
      <p class="api-note">Se guarda solo en tu teléfono. Consíguela en console.anthropic.com</p></div>`;
    document.getElementById('saveApiKey').addEventListener('click',()=>{const k=document.getElementById('apiKeyInput').value.trim();if(k){state.apiKey=k;saveState();renderChat()}});return}
  const ch=getChallenge();const day=ch.days[getNextDay()-1];const act=getStarterActivity();
  const msgs=state.chatHistory.map(m=>`<div class="chat-msg ${m.role}">${m.role==='assistant'?fmtMd(m.content):escH(m.content)}</div>`).join('');
  const sugs=getSuggestions();
  c.innerHTML=`
    <div class="context-banner"><strong>${ch.name} — Día ${day.day}:</strong> ${day.title} · ${act.label}</div>
    <div class="api-saved"><span class="api-status">✓ API conectada</span><button class="api-change" id="changeKey">cambiar</button>
      <button class="api-change" id="clearChat" style="color:var(--danger)">limpiar chat</button></div>
    <div class="chat-messages" id="chatMessages">
      ${msgs||'<div class="chat-msg system">¡Hola! Soy tu asistente panadero. Pregúntame sobre recetas, técnicas, o tu masa madre. Tengo contexto de tu progreso.</div>'}</div>
    <div class="chat-suggestions" id="chatSuggestions">${sugs.map(s=>`<button class="chat-suggest">${s}</button>`).join('')}</div>
    <div class="chat-input-area"><input type="text" class="chat-input" id="chatInput" placeholder="Pregunta algo..." autocomplete="off">
      <button class="chat-send" id="chatSend">➤</button></div>`;
  document.getElementById('changeKey').addEventListener('click',()=>{state.apiKey='';saveState();renderChat()});
  document.getElementById('clearChat').addEventListener('click',()=>{state.chatHistory=[];saveState();renderChat()});
  const inp=document.getElementById('chatInput');
  document.getElementById('chatSend').addEventListener('click',()=>sendChat());
  inp.addEventListener('keydown',e=>{if(e.key==='Enter')sendChat()});
  document.querySelectorAll('.chat-suggest').forEach(b=>{b.addEventListener('click',()=>{inp.value=b.textContent;sendChat()})});
  scrollChat();
}
function getSuggestions(){
  const d=getNextDay();const isPeru=state.activeChallenge==='pan-peruano';
  if(isPeru)return['Tips para la receta de hoy','¿Dónde consigo chancaca?','¿Cómo hago la miel?','Sustitutos de ingredientes'];
  if(d<=2)return['¿Cómo sé si amasé suficiente?','Tips para mi primer pan'];
  if(d<=7)return['¿Cómo alimentar mi starter?','¿Es normal este olor?'];
  return['Tips para sourdough','¿Cómo hago el scoring?'];
}
async function sendChat(){
  const inp=document.getElementById('chatInput');const msg=inp.value.trim();if(!msg)return;inp.value='';
  state.chatHistory.push({role:'user',content:msg});saveState();renderChatMsgs();
  const me=document.getElementById('chatMessages');const ty=document.createElement('div');
  ty.className='chat-typing';ty.innerHTML='<div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>';
  me.appendChild(ty);scrollChat();
  try{
    const ch=getChallenge();const day=ch.days[getNextDay()-1];const act=getStarterActivity();
    const sys=`Eres un panadero experto peruano, cálido y motivador. Guías a un principiante en un reto de 14 días. El usuario compra en Plaza Vea o Metro (Perú).

CONTEXTO:
- Reto activo: ${ch.name} (${ch.subtitle})
- Día actual: ${day.day}/14 — ${day.title}: ${day.subtitle}
- Ingredientes de hoy: ${day.ingredients.filter(i=>i!=='').join(', ')}
- Masa madre: ${act.label} (${act.desc}), ${state.starterFeedings.length} alimentaciones
- Días completados: ${getCompleted().sort((a,b)=>a-b).join(', ')||'ninguno'}

Responde en español, conciso (2-3 párrafos max). Temperaturas en °C. Marcas de Plaza Vea/Metro. Tono amigable.`;
    const messages=state.chatHistory.slice(-16).map(m=>({role:m.role,content:m.content}));
    const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':state.apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:1024,system:sys,messages})});
    if(!r.ok){const e=await r.json().catch(()=>({}));throw new Error(e.error?.message||'Error '+r.status)}
    const data=await r.json();ty.remove();
    state.chatHistory.push({role:'assistant',content:data.content[0]?.text||'Error'});saveState();renderChatMsgs();
  }catch(err){ty.remove();state.chatHistory.push({role:'assistant',content:'❌ '+err.message});saveState();renderChatMsgs()}}
function renderChatMsgs(){const el=document.getElementById('chatMessages');if(!el)return;
  el.innerHTML=state.chatHistory.map(m=>`<div class="chat-msg ${m.role}">${m.role==='assistant'?fmtMd(m.content):escH(m.content)}</div>`).join('');
  scrollChat();const s=document.getElementById('chatSuggestions');if(s&&state.chatHistory.length)s.style.display='none'}
function scrollChat(){const el=document.getElementById('chatMessages');if(el)setTimeout(()=>el.scrollTop=el.scrollHeight,50)}
function escH(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function fmtMd(t){let h=escH(t);h=h.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');h=h.replace(/`(.+?)`/g,'<code>$1</code>');
  h=h.split('\n\n').map(p=>'<p>'+p+'</p>').join('');h=h.replace(/\n/g,'<br>');h=h.replace(/<br>- /g,'<br>• ');return h}

// ═══ PWA ═══
function setupPWA(){
  const m={name:'Pan de Casa',short_name:'Pan de Casa',start_url:'.',display:'standalone',background_color:'#FBF7F2',theme_color:'#FBF7F2',orientation:'portrait',
    icons:[{src:'data:image/svg+xml,'+encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512"><rect width="512" height="512" rx="100" fill="#FBF7F2"/><ellipse cx="256" cy="280" rx="180" ry="120" fill="#F3DFD0" stroke="#C07C5A" stroke-width="12"/><path d="M140 250c40-70 90-90 116-90s76 20 116 90" fill="none" stroke="#C07C5A" stroke-width="8" stroke-linecap="round"/><line x1="256" y1="170" x2="256" y2="260" stroke="#C07C5A" stroke-width="8" stroke-linecap="round"/></svg>'),sizes:'512x512',type:'image/svg+xml',purpose:'any'}]};
  const l=document.createElement('link');l.rel='manifest';l.href=URL.createObjectURL(new Blob([JSON.stringify(m)],{type:'application/json'}));document.head.appendChild(l)}

setupPWA();updateHeader();renderChallengeTabs();renderPlan();
